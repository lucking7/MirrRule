# 输出配置
output:
  # 合并后的 .sgmodule 文件路径
  sgmodule: "public/Modules/All-in-One-Pro.sgmodule"
  
  # 提取的规则列表文件路径
  rulelist: "public/Modules/Rules/reject-pro.list"
  
  # 模板文件路径
  template: "Build/lib/module-merger/templates/all-in-one.template"

# 合并选项
options:
  # 是否去重 MITM hostnames
  deduplicateHostnames: true
  
  # 是否移除注释
  stripComments: true
  
  # 是否添加分隔符
  addDividers: true
  
  # 分隔符长度
  dividerLength: 30

