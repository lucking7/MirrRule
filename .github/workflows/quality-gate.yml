name: Quality Gate

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # 代码质量检查
  code-quality:
    name: 代码质量检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: ESLint 检查
        run: pnpm run lint
        continue-on-error: true
        id: lint

      - name: TypeScript 类型检查
        run: npx tsc --noEmit
        continue-on-error: true
        id: typecheck

      - name: 生成代码质量报告
        if: always()
        run: |
          echo "## 📊 代码质量检查结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.lint.outcome }}" == "success" ]; then
            echo "- ✅ ESLint: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ ESLint: 失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.typecheck.outcome }}" == "success" ]; then
            echo "- ✅ TypeScript: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ TypeScript: 失败" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 检查结果
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure'
        run: |
          echo "::error::代码质量检查失败,请修复上述问题"
          exit 1

  # 规则文件验证
  rule-validation:
    name: 规则文件验证
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 设置 Node.js 环境
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 验证规则文件语法
        id: validate_rules
        run: |
          echo "🔍 验证规则文件语法..."

          # 检查 .list 文件
          LIST_FILES=$(find Build Reference -type f -name "*.list" 2>/dev/null || echo "")
          if [ -n "$LIST_FILES" ]; then
            echo "找到 .list 文件:"
            echo "$LIST_FILES"

            # 验证每个文件
            INVALID_FILES=""
            while IFS= read -r file; do
              if [ -f "$file" ]; then
                # 检查文件是否为空
                if [ ! -s "$file" ]; then
                  echo "::warning file=$file::文件为空"
                  continue
                fi

                # 检查是否有明显的语法错误 (基础检查)
                if grep -q $'^\r' "$file"; then
                  echo "::error file=$file::检测到 Windows 行尾符 (CRLF),应使用 Unix 格式 (LF)"
                  INVALID_FILES="$INVALID_FILES $file"
                fi

                # 检查是否有无效字符
                if grep -qP '[^\x00-\x7F]' "$file" 2>/dev/null; then
                  echo "::warning file=$file::检测到非 ASCII 字符,可能导致兼容性问题"
                fi
              fi
            done <<< "$LIST_FILES"

            if [ -n "$INVALID_FILES" ]; then
              echo "::error::以下文件存在语法错误: $INVALID_FILES"
              echo "invalid_files=$INVALID_FILES" >> $GITHUB_OUTPUT
              exit 1
            fi
          fi

          echo "✅ 规则文件语法验证通过"

      - name: 检测重复规则
        id: check_duplicates
        run: |
          echo "🔍 检测重复规则..."

          # 检查 public/List 目录 (如果存在)
          if [ -d "public/List" ]; then
            DUPLICATE_COUNT=0

            for file in public/List/*.list; do
              if [ -f "$file" ]; then
                # 统计重复行 (忽略空行和注释)
                DUPLICATES=$(grep -v '^#' "$file" | grep -v '^[[:space:]]*$' | sort | uniq -d)
                if [ -n "$DUPLICATES" ]; then
                  echo "::warning file=$file::发现重复规则:"
                  echo "$DUPLICATES"
                  DUPLICATE_COUNT=$((DUPLICATE_COUNT + 1))
                fi
              fi
            done

            if [ $DUPLICATE_COUNT -gt 0 ]; then
              echo "::warning::在 $DUPLICATE_COUNT 个文件中发现重复规则,建议去重"
            fi
          fi

          echo "✅ 重复规则检测完成"

      - name: 验证 YAML/JSON 文件
        run: |
          echo "🔍 验证配置文件..."

          # 检查 YAML 文件
          YAML_FILES=$(find . -type f \( -name "*.yml" -o -name "*.yaml" \) -not -path "./node_modules/*" -not -path "./.git/*")
          if [ -n "$YAML_FILES" ]; then
            echo "验证 YAML 文件:"
            for file in $YAML_FILES; do
              if ! python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null; then
                echo "::error file=$file::YAML 语法错误"
                exit 1
              fi
              echo "  ✅ $file"
            done
          fi

          # 检查 JSON 文件
          JSON_FILES=$(find . -type f -name "*.json" -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./pnpm-lock.yaml" -not -path "./.cache/*")
          if [ -n "$JSON_FILES" ]; then
            echo "验证 JSON 文件:"
            for file in $JSON_FILES; do
              if ! python3 -c "import json; json.load(open('$file'))" 2>/dev/null; then
                echo "::error file=$file::JSON 语法错误"
                exit 1
              fi
              echo "  ✅ $file"
            done
          fi

          echo "✅ 配置文件验证通过"

      - name: 生成验证报告
        if: always()
        run: |
          echo "## 📋 规则文件验证结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.validate_rules.outcome }}" == "success" ]; then
            echo "- ✅ 规则文件语法: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 规则文件语法: 失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.check_duplicates.outcome }}" == "success" ]; then
            echo "- ✅ 重复规则检测: 完成" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 重复规则检测: 失败" >> $GITHUB_STEP_SUMMARY
          fi

  # 文件大小和结构检查
  file-checks:
    name: 文件大小和结构检查
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5

      - name: 检查大文件
        run: |
          echo "🔍 检查大文件 (>5MB)..."

          LARGE_FILES=$(find . -type f -size +5M -not -path "./node_modules/*" -not -path "./.git/*" -not -path "./.cache/*")

          if [ -n "$LARGE_FILES" ]; then
            echo "::warning::发现大文件 (>5MB):"
            echo "$LARGE_FILES"

            # 显示文件大小
            while IFS= read -r file; do
              SIZE=$(du -h "$file" | cut -f1)
              echo "::warning file=$file::文件大小: $SIZE"
            done <<< "$LARGE_FILES"
          else
            echo "✅ 未发现过大文件"
          fi

      - name: 检查必需目录
        run: |
          echo "🔍 检查项目结构..."

          REQUIRED_DIRS=("Build" ".github/workflows")
          MISSING_DIRS=""

          for dir in "${REQUIRED_DIRS[@]}"; do
            if [ ! -d "$dir" ]; then
              echo "::error::缺少必需目录: $dir"
              MISSING_DIRS="$MISSING_DIRS $dir"
            else
              echo "  ✅ $dir"
            fi
          done

          if [ -n "$MISSING_DIRS" ]; then
            echo "::error::缺少必需目录: $MISSING_DIRS"
            exit 1
          fi

          echo "✅ 项目结构完整"

      - name: 统计项目指标
        run: |
          echo "## 📈 项目统计" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # 统计代码行数
          TS_FILES=$(find Build -type f -name "*.ts" 2>/dev/null | wc -l)
          echo "- TypeScript 文件: $TS_FILES 个" >> $GITHUB_STEP_SUMMARY

          # 统计规则文件
          LIST_FILES=$(find public -type f -name "*.list" 2>/dev/null | wc -l || echo "0")
          echo "- 规则列表文件: $LIST_FILES 个" >> $GITHUB_STEP_SUMMARY

          # 统计模块文件
          MODULE_FILES=$(find public -type f -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
          echo "- 模块文件: $MODULE_FILES 个" >> $GITHUB_STEP_SUMMARY

          # 统计工作流
          WORKFLOW_FILES=$(find .github/workflows -type f -name "*.yml" 2>/dev/null | wc -l)
          echo "- GitHub Actions 工作流: $WORKFLOW_FILES 个" >> $GITHUB_STEP_SUMMARY

  # 质量门控汇总
  quality-gate-summary:
    name: 质量门控汇总
    runs-on: ubuntu-latest
    needs: [code-quality, rule-validation, file-checks]
    if: always()

    steps:
      - name: 检查所有任务状态
        run: |
          echo "## ✅ 质量门控汇总" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          CODE_QUALITY="${{ needs.code-quality.result }}"
          RULE_VALIDATION="${{ needs.rule-validation.result }}"
          FILE_CHECKS="${{ needs.file-checks.result }}"

          echo "### 各项检查结果:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$CODE_QUALITY" == "success" ]; then
            echo "- ✅ 代码质量检查: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 代码质量检查: 失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$RULE_VALIDATION" == "success" ]; then
            echo "- ✅ 规则文件验证: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 规则文件验证: 失败" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$FILE_CHECKS" == "success" ]; then
            echo "- ✅ 文件结构检查: 通过" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ 文件结构检查: 失败" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # 判断总体结果
          if [ "$CODE_QUALITY" == "success" ] && [ "$RULE_VALIDATION" == "success" ] && [ "$FILE_CHECKS" == "success" ]; then
            echo "### 🎉 质量门控: **通过**" >> $GITHUB_STEP_SUMMARY
            exit 0
          else
            echo "### ❌ 质量门控: **未通过**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "请修复上述失败的检查项后重新提交。" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
