name: Mirror Sync

on:
  # 定时触发：每小时的 5, 30, 55 分
  schedule:
    - cron: '5,30,55 * * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      group:
        description: 'Mirror group to sync (leave empty for all)'
        required: false
        type: string
  
  # Push 到 main 分支时触发
  push:
    branches: [main]
    paths:
      - 'Build/lib/mirror-sync/**'
      - 'Build/sync-mirrors.ts'
      - '.github/workflows/mirror-sync.yml'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run mirror sync
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.group }}" ]; then
            pnpm run node ./Build/sync-mirrors.ts "${{ github.event.inputs.group }}"
          else
            pnpm run node ./Build/sync-mirrors.ts
          fi

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          DATE="$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          
          git add public/Mirror/
          git commit -m "🪞 Synced mirrors with upstream at $DATE (UTC+8)"
          git push origin main

      - name: No changes detected
        if: steps.check_changes.outputs.has_changes != 'true'
        run: echo "✅ No changes detected - mirrors are up to date"

