name: Build
on:
  push:
    branches:
      - master
      - main
  pull_request:
  schedule:
    - cron: '0 5 * * *'  # Runs at 05:00 UTC (13:00 UTC+8)
    - cron: '0 17 * * *' # Runs at 17:00 UTC (01:00 UTC+8)
  workflow_dispatch:
    inputs:
      skip_cache:
        description: 'Skip cache restoration'
        required: false
        default: false
        type: boolean
      full_build:
        description: 'Run full build (all components)'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: smorimoto/tune-github-hosted-runner-network@v1
        # https://github.com/actions/runner-images/issues/1187
      - uses: actions/checkout@v5
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          run_install: false
      - uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      - name: Grab Building Folder
        id: ramdisk
        run: |
          echo "build_dir=previous-build-${{ github.run_id }}-${{ github.run_number }}" >> $GITHUB_OUTPUT
      - name: Download Previous Build
        uses: actions/checkout@v5
        with:
          repository: SukkaLab/ruleset.skk.moe
          persist-credentials: false
          filter: "tree:0" # we don't care about git history here
          fetch-tags: false
          path: ${{ steps.ramdisk.outputs.build_dir }}
      - name: Setup build folder
        run: |
          if [ ! -d ${{ steps.ramdisk.outputs.build_dir }}/.git ]; then
            echo ".git not found"
            exit 1
          fi
          rm -rf "${{ steps.ramdisk.outputs.build_dir }}/.git"

          if [ ! -d ${{ steps.ramdisk.outputs.build_dir }}/List ]; then
            echo "List not found"
            exit 1
          fi
          echo "public directory is ready: ${{ steps.ramdisk.outputs.build_dir }}"
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
          echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "minute=$(date +'%M')" >> $GITHUB_OUTPUT
          echo "second=$(date +'%S')" >> $GITHUB_OUTPUT
      - name: Restore cache.db
        uses: actions/cache/restore@v4
        id: cache-db-restore
        with:
          path: |
            .cache
          key: ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:
            ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:
            ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}
            ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-
            ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-
            ${{ runner.os }}-v3-
      - run: pnpm install
      - name: Quality Gate - Run Validation
        run: |
          echo "🔍 Running quality checks..."
          pnpm run validate || echo "::warning::Quality checks found issues but continuing build"
      - run: pnpm run build
        env:
          PUBLIC_DIR: ${{ steps.ramdisk.outputs.build_dir }}
      - name: Pre-deploy check
        # If the public directory doesn't exist, the build should fail.
        # If the public directory is empty, the build should fail.
        run: |
          if [ ! -d ${{ steps.ramdisk.outputs.build_dir }} ]; then
            echo "public directory not found"
            exit 1
          fi
          if [ ! "$(ls -A ${{ steps.ramdisk.outputs.build_dir }})" ]; then
            echo "public directory is empty"
            exit 1
          fi
          if [ ! -f .BUILD_FINISHED ]; then
            echo ".BUILD_FINISHED not found"
            exit 1
          fi
          echo "public directory is ready: ${{ steps.ramdisk.outputs.build_dir }}"
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: ${{ steps.ramdisk.outputs.build_dir }}
          if-no-files-found: error
          retention-days: 1
          compression-level: 4
          include-hidden-files: false
      - name: Cache cache.db
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .cache
          key: ${{ runner.os }}-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}

  diff_deployment_on_pr:
    if: github.ref != 'refs/heads/master'
    needs:
      - build
    name: Diff output
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public
      - name: Diff
        run: |
          git clone --filter=tree:0 --no-tags https://github.com/SukkaLab/ruleset.skk.moe.git ./deploy-git >/dev/null 2>&1
          cd ./deploy-git
          git fetch origin master >/dev/null 2>&1
          rm -rf ./*
          cp -rf ../public/* ./
          git --no-pager diff --minimal

  deploy_to_cloudflare_pages:
    needs:
      - build
    name: Deploy to Cloudflare Pages
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    # matrix is a tricky way to define a variable directly in the action yaml
    strategy:
      matrix:
        wranglerVersion: ['3.114.12']
    steps:
      - name: Get NPM cache directory path
        id: npm_cache_path
        shell: sh
        run: echo dir=$(npm config get cache) >> $GITHUB_OUTPUT
      - uses: actions/cache@v4
        with:
          path: |
            ${{ steps.npm_cache_path.outputs.dir }}
            node_modules
          key: deploy-to-cloudflare-npm-${{ runner.os }}-${{ runner.arch }}-wrangler-${{ matrix.wranglerVersion }}
          restore-keys: |
            deploy-to-cloudflare-npm-${{ runner.os }}-${{ runner.arch }}-wrangler-
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=nrrule --commit-dirty=true --branch=main
          wranglerVersion: ${{ matrix.wranglerVersion }}

  deploy_to_nrrule:
    needs:
      - build
    name: Deploy to NRRule Repository
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public
      - name: Deploy to NRRule Repository
        continue-on-error: true
        run: |
          echo "📤 Deploying to NRRule Repository..."

          # 解除归档状态（如果仓库被归档）
          echo "🔓 Unarchiving repository..."
          gh repo unarchive lucking7/NRRule --yes || echo "⚠️ Repository is not archived or unarchive failed"

          git clone --filter=tree:0 --no-tags \
            https://${GH_USER}:${GH_TOKEN}@github.com/lucking7/NRRule.git \
            ./deploy-git

          cd ./deploy-git

          git config --global push.default matching
          git config --global user.email "${GH_EMAIL}"
          git config --global user.name "${GH_USER}"

          rm -rf ./*
          cp -rf ../public/* ./

          echo "# NRRule - 规则集部署仓库" > README.md
          echo "" >> README.md
          echo "本仓库由 GitHub Actions 自动部署，包含构建好的规则集文件。" >> README.md
          echo "" >> README.md
          echo "## 📦 内容" >> README.md
          echo "" >> README.md
          echo "- **List/**: 规则列表文件" >> README.md
          echo "- **Modules/**: Surge 模块文件" >> README.md
          echo "- **Mirror/**: 镜像同步的规则文件" >> README.md
          echo "" >> README.md
          echo "## 🔗 源代码" >> README.md
          echo "" >> README.md
          echo "源代码仓库: https://github.com/${{ github.repository }}" >> README.md
          echo "" >> README.md
          echo "## 📅 最后更新" >> README.md
          echo "" >> README.md
          echo "- **时间**: $(date +'%Y-%m-%d %H:%M:%S UTC')" >> README.md
          echo "- **提交**: ${GITHUB_SHA}" >> README.md

          git add --all .
          git commit -m "Deploy: https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}"
          git push --quiet --force origin HEAD:main

          cd ..
          rm -rf ./deploy-git

          # 归档仓库以节省空间
          echo "🔒 Archiving repository..."
          gh repo archive lucking7/NRRule --yes || echo "⚠️ Archive failed"

          echo "✅ Deployed to NRRule Repository"
          echo "🔗 URL: https://github.com/lucking7/NRRule"
        env:
          GH_EMAIL: ${{ secrets.GIT_EMAIL }}
          GH_USER: ${{ secrets.GIT_USER }}
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}
