name: Merge Modules

on:
  # 定时触发：每 6 小时执行一次
  schedule:
    - cron: '30 */6 * * *'
  
  # 手动触发
  workflow_dispatch:
    inputs:
      module_groups:
        description: '要合并的模块组 (all/base/premium/custom)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - base      # 基础功能模块
          - premium   # 高级功能模块
          - custom    # 自定义模块
      output_format:
        description: '输出格式 (surge/stash/both)'
        required: false
        default: 'both'
        type: choice
        options:
          - surge
          - stash
          - both
  
  # Push 到相关文件时触发
  push:
    branches: [main, master]
    paths:
      - 'Build/lib/module-merger/**'
      - 'Build/merge-modules.ts'
      - '.github/workflows/merge-modules.yml'
      - 'public/Modules/**'

concurrency:
  group: module-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge:
    name: Merge Modules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare module sources
        run: |
          echo "📋 Checking available modules..."
          
          # 创建模块目录
          mkdir -p public/Modules/Original
          mkdir -p public/Modules/Merged
          
          # 列出现有模块
          if [ -d "public/Mirror" ]; then
            echo "📦 Modules from Mirror:"
            find public/Mirror -name "*.sgmodule" -o -name "*.stoverride" | head -10
          fi
          
          if [ -d "public/Modules/Original" ]; then
            echo "📦 Original modules:"
            ls -la public/Modules/Original/ 2>/dev/null || echo "  No original modules found"
          fi

      - name: Run module merge
        env:
          CI: true
          MODULE_GROUPS: ${{ github.event.inputs.module_groups || 'all' }}
          OUTPUT_FORMAT: ${{ github.event.inputs.output_format || 'both' }}
        run: |
          echo "🔀 Merging modules..."
          echo "  Groups: $MODULE_GROUPS"
          echo "  Format: $OUTPUT_FORMAT"
          
          pnpm run merge-modules

      - name: Validate merged modules
        run: |
          echo "✅ Validating merged modules..."
          
          # 检查 Surge 模块
          if [ -d "public/Modules/Merged" ]; then
            for file in public/Modules/Merged/*.sgmodule; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "  Checking $filename..."
                
                # 基本语法检查
                if grep -q "^#!name=" "$file" && grep -q "^#!desc=" "$file"; then
                  echo "    ✓ Header valid"
                else
                  echo "    ✗ Missing required headers"
                fi
                
                # 统计内容
                rules=$(grep -c "^RULE-SET\|^DOMAIN" "$file" 2>/dev/null || echo 0)
                scripts=$(grep -c "^.*= type=http-" "$file" 2>/dev/null || echo 0)
                echo "    Rules: $rules, Scripts: $scripts"
              fi
            done
          fi
          
          # 检查 Stash 覆写
          if [ -d "public/Modules/Merged" ]; then
            for file in public/Modules/Merged/*.stoverride; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "  Checking $filename..."
                
                # YAML 格式检查
                if command -v python3 >/dev/null 2>&1; then
                  python3 -c "import yaml; yaml.safe_load(open('$file'))" 2>/dev/null && \
                    echo "    ✓ Valid YAML" || echo "    ✗ Invalid YAML"
                fi
              fi
            done
          fi

      - name: Generate module catalog
        run: |
          echo "📚 Generating module catalog..."
          
          cat > public/Modules/Merged/README.md << 'EOF'
          # 合并模块目录

          ## All-in-One 模块
          
          ### Surge 模块
          EOF
          
          if [ -d "public/Modules/Merged" ]; then
            for file in public/Modules/Merged/*.sgmodule; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                name=$(grep "^#!name=" "$file" | cut -d= -f2)
                desc=$(grep "^#!desc=" "$file" | cut -d= -f2)
                echo "- **$filename**: $name - $desc" >> public/Modules/Merged/README.md
              fi
            done
            
            echo "" >> public/Modules/Merged/README.md
            echo "### Stash 覆写" >> public/Modules/Merged/README.md
            
            for file in public/Modules/Merged/*.stoverride; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                echo "- **$filename**" >> public/Modules/Merged/README.md
              fi
            done
          fi
          
          echo "" >> public/Modules/Merged/README.md
          echo "更新时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') (UTC+8)" >> public/Modules/Merged/README.md

      - name: Check for changes
        id: check_changes
        run: |
          git add -N public/Modules/Merged/
          if git diff --quiet --exit-code public/Modules/Merged/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "✅ No changes detected"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "🔄 Changes detected in merged modules"
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          DATE="$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          GROUPS="${{ github.event.inputs.module_groups || 'all' }}"
          
          git add public/Modules/Merged/
          git commit -m "🎯 合并模块 [组: $GROUPS] - $DATE (UTC+8)"
          git push origin ${{ github.ref_name }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-modules-${{ github.run_number }}
          path: public/Modules/Merged/
          retention-days: 7
