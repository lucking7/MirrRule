name: Rule Merge

on:
  # 定时触发：每 4 小时执行一次  
  schedule:
    - cron: '15 */4 * * *'
  
  # 工作流依赖
  workflow_run:
    workflows: ["Rule Conversion"]
    types:
      - completed
  
  # 手动触发
  workflow_dispatch:
    inputs:
      merge_strategy:
        description: '合并策略 (smart/aggressive/conservative)'
        required: false
        default: 'smart'
        type: choice
        options:
          - smart       # 智能去重
          - aggressive  # 激进合并（保留更多规则）
          - conservative # 保守合并（只保留确定规则）
  
  # Push 到相关文件时触发
  push:
    branches: [main, master]
    paths:
      - 'Build/lib/rule-merger/**'
      - 'Build/merge-rules.ts'
      - '.github/workflows/rule-merge.yml'

concurrency:
  group: rule-merge-${{ github.ref }}
  cancel-in-progress: true

jobs:
  merge:
    name: Merge Rules
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download rule sources
        id: download
        run: |
          echo "📥 Downloading rule sources..."
          mkdir -p temp/rules
          
          # 下载多个规则源
          SOURCES=(
            "https://raw.githubusercontent.com/DivineEngine/Profiles/master/Surge/Ruleset/Guard/Advertising.list"
            "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/master/Clash/BanAD.list"
            "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Surge/AdvertisingLite/AdvertisingLite.list"
          )
          
          for url in "${SOURCES[@]}"; do
            filename=$(basename "$url")
            echo "  Downloading $filename..."
            curl -sL "$url" -o "temp/rules/$filename" || echo "  ⚠️ Failed to download $filename"
          done
          
          echo "✅ Download complete"

      - name: Run rule merge
        env:
          CI: true
          MERGE_STRATEGY: ${{ github.event.inputs.merge_strategy || 'smart' }}
        run: |
          echo "🔄 Merging rules with strategy: $MERGE_STRATEGY"
          pnpm run node ./Build/merge-rules.ts --strategy=$MERGE_STRATEGY

      - name: Generate statistics
        run: |
          echo "📊 Merge Statistics:"
          echo ""
          
          if [ -d "public/Rules/Merged" ]; then
            for file in public/Rules/Merged/*.list; do
              if [ -f "$file" ]; then
                filename=$(basename "$file")
                lines=$(grep -v "^#" "$file" | grep -v "^$" | wc -l)
                echo "  - $filename: $lines rules"
              fi
            done
          else
            echo "  ⚠️ No merged rules found"
          fi

      - name: Check for changes
        id: check_changes
        run: |
          git add -N public/Rules/Merged/
          if git diff --quiet --exit-code public/Rules/Merged/; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push changes
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          DATE="$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
          STRATEGY="${{ github.event.inputs.merge_strategy || 'smart' }}"
          
          git add public/Rules/Merged/
          git commit -m "🔀 合并规则 [策略: $STRATEGY] - $DATE (UTC+8)"
          git push origin ${{ github.ref_name }}

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merged-rules-${{ github.run_number }}
          path: public/Rules/Merged/
          retention-days: 7
