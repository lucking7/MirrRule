name: Main Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时执行一次
  workflow_dispatch:
    inputs:
      clearCache:
        description: '清理缓存'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [trigger-main-build]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main_build:
    name: 主构建流程
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: write

    services:
      docker:
        image: xream/script-hub:latest
        ports:
          - 9100:9100
          - 9101:9101

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取当前日期
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
          echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "minute=$(date +'%M')" >> $GITHUB_OUTPUT
          echo "second=$(date +'%S')" >> $GITHUB_OUTPUT

      - name: 恢复缓存
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            .cache
            .cache/*.db
            .cache/*.db-wal
            .cache/*.db-shm
          key: ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}
          restore-keys: |
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-
            ${{ runner.os }}-build-cache-v4-

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y curl jq netcat-openbsd
          npm install -g tsx

      - name: 第一阶段：外部规则和模块获取
        if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
        run: |
          echo "🔄 === 第一阶段：外部规则和模块获取 ==="
          echo "1️⃣ 同步外部规则源..."
          npm run sync:rules
          echo "2️⃣ 同步外部模块..."
          npm run sync:mirror
          echo "✅ 第一阶段完成"
        env:
          TZ: 'Asia/Shanghai'

      - name: 等待 Docker 服务就绪
        run: |
          echo "等待 Docker 服务就绪..."
          for i in {1..10}; do
            nc -z localhost 9101 && break
            sleep 10
          done

      - name: 转换 Loon 插件
        run: |
          echo "开始 Loon 到 Surge 规则转换..."
          mkdir -p Surge/Modules
          mkdir -p .cache
          
          # 确保转换服务就绪
          if ! nc -z localhost 9101; then
            echo "转换服务未就绪，跳过 Loon 转换"
            exit 0
          fi
          
          # 定义要转换的 Loon 插件
          cat > plugin_urls.txt << 'EOF'
          https://github.com/fmz200/wool_scripts/raw/main/Loon/plugin/blockAds.plugin|Remove_ads_by_fmz
          EOF
          
          # 设置并发数
          CONCURRENCY=${LOON_CONVERSION_CONCURRENCY:-5}
          echo "使用并发数: $CONCURRENCY"
          
          # 初始化缓存文件
          CACHE_FILE=".cache/loon_conversion_cache.txt"
          touch "$CACHE_FILE"
          
          # 清理过期缓存（7天）
          if [ "${{ github.event.inputs.clearCache }}" == "true" ]; then
            echo "清理所有缓存..."
            > "$CACHE_FILE"
          else
            # 清理7天前的缓存条目
            TEMP_CACHE=$(mktemp)
            while IFS='|' read -r cache_url cache_hash cache_time cache_name; do
              if [ -n "$cache_time" ] && [ "$cache_time" -gt $(($(date +%s) - 604800)) ]; then
                echo "${cache_url}|${cache_hash}|${cache_time}|${cache_name}" >> "$TEMP_CACHE"
              fi
            done < "$CACHE_FILE"
            mv "$TEMP_CACHE" "$CACHE_FILE"
          fi
          
          # 简单的转换函数
          convert_plugin() {
            local line="$1"
            local idx="$2"
            
            IFS='|' read -r plugin_url plugin_name <<< "$line"
            
            if [[ -z "$plugin_url" ]] || [[ -z "$plugin_name" ]]; then
              echo "[任务 $idx] ❌ 无效的插件配置: $line"
              return 1
            fi
            
            echo "[任务 $idx] 开始转换: $plugin_name"
            
            local output_file="Surge/Modules/${plugin_name}.sgmodule"
            
            # 检查缓存
            local cache_entry=$(grep "^${plugin_url}|" "$CACHE_FILE" | tail -1)
            local need_convert=true
            
            if [ -n "$cache_entry" ]; then
              IFS='|' read -r _ cached_hash cached_time _ <<< "$cache_entry"
              
              # 获取远程文件的 ETag 或最后修改时间
              local remote_headers=$(curl -sI "$plugin_url" | tr -d '\r')
              local remote_etag=$(echo "$remote_headers" | grep -i "^etag:" | cut -d' ' -f2- | tr -d '"')
              local remote_modified=$(echo "$remote_headers" | grep -i "^last-modified:" | cut -d' ' -f2-)
              local remote_hash="${remote_etag:-$remote_modified}"
              
              if [ -n "$remote_hash" ] && [ "$remote_hash" = "$cached_hash" ] && [ -f "$output_file" ]; then
                echo "[任务 $idx] ⚡ 使用缓存: $plugin_name (未更改)"
                need_convert=false
              else
                echo "[任务 $idx] 🔄 需要更新: $plugin_name"
              fi
            fi
            
            if [ "$need_convert" = true ]; then
              local encoded_url=$(echo "$plugin_url" | jq -sRr @uri)
              local download_url="http://localhost:9101/file/_start_/${plugin_url}/_end_/${plugin_name}.sgmodule?type=loon-plugin&target=surge-module&del=true"
              
              # 使用 Script Hub 进行基础转换
              if curl -A "script-hub/1.0.0" -L --connect-timeout 10 --max-time 30 -o "$output_file" "$download_url" 2>/dev/null; then
                echo "[任务 $idx] ✅ 转换成功: $plugin_name"
                
                # 更新缓存
                local remote_headers=$(curl -sI "$plugin_url" | tr -d '\r')
                local remote_etag=$(echo "$remote_headers" | grep -i "^etag:" | cut -d' ' -f2- | tr -d '"')
                local remote_modified=$(echo "$remote_headers" | grep -i "^last-modified:" | cut -d' ' -f2-)
                local remote_hash="${remote_etag:-$remote_modified}"
                local current_time=$(date +%s)
                
                # 从缓存中删除旧条目
                grep -v "^${plugin_url}|" "$CACHE_FILE" > "$CACHE_FILE.tmp" || true
                mv "$CACHE_FILE.tmp" "$CACHE_FILE"
                
                # 添加新缓存条目
                echo "${plugin_url}|${remote_hash}|${current_time}|${plugin_name}" >> "$CACHE_FILE"
                
                return 0
              else
                echo "[任务 $idx] ❌ 转换失败: $plugin_name"
                return 1
              fi
            fi
            
            return 0
          }
          
          # 并发转换
          job_count=0
          success_count=0
          cache_count=0
          fail_count=0
          
          while IFS= read -r line; do
            # 等待有空闲进程槽
            while [ $(jobs -r | wc -l) -ge $CONCURRENCY ]; do
              sleep 0.1
            done
            
            # 启动后台转换任务
            (
              if convert_plugin "$line" "$job_count"; then
                # 检查是否使用了缓存
                if grep -q "⚡ 使用缓存" <<< "$(convert_plugin "$line" "$job_count" 2>&1)"; then
                  echo "CACHE" > ".cache/job_${job_count}_result"
                else
                  echo "SUCCESS" > ".cache/job_${job_count}_result"
                fi
              else
                echo "FAIL" > ".cache/job_${job_count}_result"
              fi
            ) &
            
            job_count=$((job_count + 1))
            
            # 避免过快启动
            sleep 0.1
          done < plugin_urls.txt
          
          # 等待所有任务完成
          echo "等待所有转换任务完成..."
          wait
          
          # 统计结果
          for ((i=0; i<job_count; i++)); do
            if [ -f ".cache/job_${i}_result" ]; then
              result=$(cat ".cache/job_${i}_result")
              case "$result" in
                "SUCCESS") success_count=$((success_count + 1)) ;;
                "CACHE") cache_count=$((cache_count + 1)) ;;
                "FAIL") fail_count=$((fail_count + 1)) ;;
              esac
              rm -f ".cache/job_${i}_result"
            fi
          done
          
          echo ""
          echo "转换统计:"
          echo "  - 总任务数: $job_count"
          echo "  - 新转换: $success_count"
          echo "  - 使用缓存: $cache_count"
          echo "  - 失败: $fail_count"
          echo ""
          
          # 显示缓存信息
          cache_size=$(wc -l < "$CACHE_FILE" 2>/dev/null || echo "0")
          echo "缓存信息:"
          echo "  - 缓存条目: $cache_size"
          echo "  - 缓存文件: $CACHE_FILE"
          
          echo "Loon 插件转换完成"

      - name: 转换 QX 重写规则
        run: |
          echo "开始 QX 到 Surge 规则转换..."
          
          # 确保转换服务就绪
          if ! nc -z localhost 9101; then
            echo "转换服务未就绪，跳过 QX 转换"
            exit 0
          fi
          
          # 定义要转换的 QX 规则
          declare -A qx_rules=(
            ["Chongxie_by_fmz"]="https://github.com/fmz200/wool_scripts/raw/main/QuantumultX/rewrite/chongxie.txt"
          )
          
          # 转换 QX 规则
          for name in "${!qx_rules[@]}"; do
            url="${qx_rules[$name]}"
            output_file="Surge/Modules/${name}.sgmodule"
            
            echo "转换 QX 规则: $name"
            encoded_name=$(echo "$name" | jq -sRr @uri)
            
            # 使用 Script Hub 转换 QX 重写到 Surge 模块
            download_url="http://localhost:9101/file/_start_/${url}/_end_/${name}.sgmodule?type=qx-rewrite&target=surge-module&del=true"
            

            
            if curl -A "script-hub/1.0.0" -L --connect-timeout 10 --max-time 30 -o "$output_file" "$download_url" 2>/dev/null; then
              echo "✅ 转换成功: $name"
            else
              echo "❌ 转换失败: $name"
            fi
          done
          
          echo "QX 规则转换完成"

      - name: 第二阶段：源文件组织和预处理
        run: |
          echo "📂 === 第二阶段：源文件组织 ==="
          echo "1️⃣ 处理和增强 Surge 模块..."
          echo "   - 地址修复、参数注入、规则注入、验证等"
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx Chores/engineering/sync/module-processor.ts || {
            echo "⚠️  模块处理失败，但继续构建流程"
          }
          
          echo "2️⃣ 合并 Surge 模块..."
          mkdir -p Surge/Modules/Rules
          npm run merge
          
          echo "3️⃣ 检查规则文件组织..."
          echo "   - Surge/Rulesets: 混合规则集"
          echo "   - Source/domainset: 域名规则集"
          echo "   - Source/ip: IP规则集"
          echo "   - Source/non_ip: 非IP规则集"
          echo "✅ 第二阶段完成"

      - name: 第三阶段：规则验证
        id: validate-rules
        run: |
          echo "🔍 === 第三阶段：规则验证 ==="
          echo ""
          
          cd ./Chores/engineering
          
          echo "📋 执行预构建验证..."
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx -e "
          import { validateAllRules } from './build/scripts/validate-all-rules.js';
          import { createSpan } from './build/trace/index.js';
          (async () => {
            const span = createSpan('validate-phase');
            await validateAllRules(span);
            span.stop();
          })();
          "
          
          cd ../..
          echo "✅ 第三阶段完成"

      - name: 第四阶段：增量构建检测
        id: incremental-check
        run: |
          echo "🔄 === 第四阶段：增量构建检测 ==="
          echo ""
          
          # 创建或读取上次构建的哈希文件
          HASH_FILE=".cache/build-hashes.json"
          mkdir -p .cache
          
          if [ -f "$HASH_FILE" ]; then
            echo "📊 发现上次构建记录，执行增量构建检测..."
            cp "$HASH_FILE" "$HASH_FILE.old"
          else
            echo "🆕 首次构建，将执行完整构建..."
            echo "{}" > "$HASH_FILE"
          fi
          
          # 计算当前文件哈希
          echo "📝 计算文件哈希..."
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx -e "
          import { createHash } from 'crypto';
          import { readFileSync, writeFileSync, existsSync } from 'fs';
          import { glob } from 'glob';
          
          async function calculateHashes() {
            const files = await glob(['Surge/Rulesets/**/*.list', 'Source/**/*'], { nodir: true });
            const hashes = {};
            
            for (const file of files) {
              try {
                const content = readFileSync(file);
                const hash = createHash('sha256').update(content).digest('hex');
                hashes[file] = hash;
              } catch (e) {
                console.error(\`Error hashing \${file}:\`, e.message);
              }
            }
            
            writeFileSync('.cache/build-hashes.json', JSON.stringify(hashes, null, 2));
            
            // 比较变化
            if (existsSync('.cache/build-hashes.json.old')) {
              const oldHashes = JSON.parse(readFileSync('.cache/build-hashes.json.old', 'utf-8'));
              const changed = [];
              const added = [];
              const deleted = [];
              
              for (const file in hashes) {
                if (!oldHashes[file]) {
                  added.push(file);
                } else if (oldHashes[file] !== hashes[file]) {
                  changed.push(file);
                }
              }
              
              for (const file in oldHashes) {
                if (!hashes[file]) {
                  deleted.push(file);
                }
              }
              
              console.log(\`\n📊 文件变化统计:\`);
              console.log(\`  - 新增: \${added.length} 个\`);
              console.log(\`  - 修改: \${changed.length} 个\`);
              console.log(\`  - 删除: \${deleted.length} 个\`);
              
              if (changed.length > 0 || added.length > 0 || deleted.length > 0) {
                console.log(\`\n需要重新构建的文件:\`);
                [...changed, ...added].slice(0, 10).forEach(f => console.log(\`  - \${f}\`));
                if ([...changed, ...added].length > 10) {
                  console.log(\`  ... 还有 \${[...changed, ...added].length - 10} 个文件\`);
                }
                
                // 保存变化列表
                writeFileSync('.cache/changed-files.json', JSON.stringify({ changed, added, deleted }));
              } else {
                console.log(\`\n✅ 没有文件变化，可以跳过构建\`);
                writeFileSync('.cache/changed-files.json', JSON.stringify({ changed: [], added: [], deleted: [] }));
              }
            }
          }
          
          calculateHashes();
          "
          
          echo "✅ 第四阶段完成"

      - name: 第五阶段：构建规则集
        id: build-rules
        run: |
          echo "🏗️  === 第五阶段：构建规则集 ==="
          echo ""
          
          cd ./Chores/engineering
          
          # 检查是否需要构建
          if [ -f "../.cache/changed-files.json" ]; then
            changed_count=$(jq '.changed | length' ../.cache/changed-files.json)
            added_count=$(jq '.added | length' ../.cache/changed-files.json)
            deleted_count=$(jq '.deleted | length' ../.cache/changed-files.json)
            
            if [ "$changed_count" -eq 0 ] && [ "$added_count" -eq 0 ] && [ "$deleted_count" -eq 0 ]; then
              echo "📋 没有文件变化，跳过构建..."
              echo "skip_build=true" >> $GITHUB_OUTPUT
              cd ../..
              echo "✅ 第五阶段完成（跳过）"
              exit 0
            fi
          fi
          
          echo "📋 执行规则集构建..."
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx -e "
          import { buildCommon } from './build/scripts/build-common.js';
          import { buildMixedRuleset } from './build/scripts/build-mixed-ruleset.js';
          import { createSpan } from './build/trace/index.js';
          (async () => {
            const span = createSpan('build-phase');
            await Promise.all([
              buildCommon(span),
              buildMixedRuleset(span)
            ]);
            span.stop();
          })();
          "
          
          cd ../..
          echo "skip_build=false" >> $GITHUB_OUTPUT
          echo "✅ 第五阶段完成"

      - name: 第六阶段：规则优化
        id: optimize-rules
        if: steps.build-rules.outputs.skip_build != 'true'
        run: |
          echo "⚡ === 第六阶段：规则优化 ==="
          echo ""
          
          cd ./Chores/engineering
          
          echo "📋 执行规则优化..."
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx -e "
          import { optimizeAllRules } from './build/scripts/optimize-all-rules.js';
          import { createSpan } from './build/trace/index.js';
          (async () => {
            const span = createSpan('optimize-phase');
            await optimizeAllRules(span);
            span.stop();
          })();
          "
          
          cd ../..
          echo "✅ 第六阶段完成"

      - name: 第七阶段：构建网站
        id: build-website
        run: |
          echo "🌐 === 第七阶段：构建网站 ==="
          echo ""
          
          # 设置输出目录
          export OUTPUT_DIR="$(pwd)/public"
          mkdir -p public
          
          echo "📋 构建网站..."
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx Chores/engineering/build/scripts/build-web-page.ts
          
          # 验证构建结果
          if [ ! -f "public/index.html" ]; then
            echo "⚠️  网站构建可能未完成，创建基础页面..."
            echo '<!DOCTYPE html><html><head><title>Esdeath Rules</title></head><body><h1>Esdeath Rules</h1></body></html>' > public/index.html
          fi
          
          echo "✅ 第七阶段完成"

      - name: 第八阶段：构建报告和统计
        id: build-report
        run: |
          echo "📊 === 第八阶段：构建报告和统计 ==="
          echo ""
          
          echo "✅ 构建流程已完成："
          echo "   • 规则验证（TLD、哈希冲突检测）"
          echo "   • 增量构建检测（文件哈希对比）"
          echo "   • 规则集构建（分类处理）"
          echo "   • 智能优化（tldts规范化、CIDR合并、去重）"
          echo "   • 网站构建（生成静态页面）"
          echo ""
          
          # 统计文件数量
          sgmodule_count=$(find Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
          ruleset_count=$(find Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0")
          script_count=$(find Surge/Scripts -name "*.js" 2>/dev/null | wc -l || echo "0")
          
          echo "📈 构建统计："
          echo "   • Surge 模块: ${sgmodule_count} 个"
          echo "   • 规则集文件: ${ruleset_count} 个"
          echo "   • 脚本文件: ${script_count} 个"
          echo ""
          
          # 增量构建统计
          if [ -f ".cache/changed-files.json" ]; then
            changed_count=$(jq '.changed | length' .cache/changed-files.json)
            added_count=$(jq '.added | length' .cache/changed-files.json)
            deleted_count=$(jq '.deleted | length' .cache/changed-files.json)
            
            echo "🔄 增量构建统计："
            echo "   • 修改文件: ${changed_count} 个"
            echo "   • 新增文件: ${added_count} 个"
            echo "   • 删除文件: ${deleted_count} 个"
            echo ""
          fi
          
          echo "✅ 第八阶段完成"

      - name: 后验证检查
        if: steps.build-rules.outputs.skip_build != 'true'
        run: |
          echo "🔍 执行构建后验证..."
          
          cd ./Chores/engineering
          
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx -e "
          import { validateAllRules } from './build/scripts/validate-all-rules.js';
          import { createSpan } from './build/trace/index.js';
          (async () => {
            const span = createSpan('post-validate-phase');
            await validateAllRules(span, { postBuild: true });
            span.stop();
          })();
          "
          
          cd ../..
          echo "✅ 后验证完成"

      - name: 第九阶段：部署准备
        run: |
          echo "🚀 === 第九阶段：部署准备 ==="
          echo ""
          
          echo "📁 输出文件组织："
          echo "   • Surge/Modules: 模块文件"
          echo "   • Surge/Rulesets: 规则集文件"
          echo "   • Surge/Scripts: 脚本文件"
          echo "   • public/: 网站文件"
          echo ""
          
          # 复制必要文件到 public 目录
          if [ -d "public" ]; then
            echo "📋 准备部署文件..."
            cp -r Surge public/ 2>/dev/null || true
            cp -r output public/ 2>/dev/null || true
            
            # 生成部署信息
            echo "部署时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" > public/deploy-info.txt
            echo "Git Commit: ${{ github.sha }}" >> public/deploy-info.txt
          fi
          
          echo "✅ 第九阶段完成"
          
      - name: 上传网站文件
        if: success() && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: website-files
          path: public/
          retention-days: 1

      - name: 第十阶段：Git提交和推送
        run: |
          echo "📤 === 第十阶段：Git提交和推送 ==="
          echo "1️⃣ 准备 Git 提交..."
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Surge/Modules/*.sgmodule 2>/dev/null || true
          git add Surge/Modules/Rules/*.list 2>/dev/null || true
          git add Surge/Scripts/*.js 2>/dev/null || true
          git add Surge/Rulesets/**/*.list 2>/dev/null || true
          git add Chores/ruleset/**/*.list 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有文件需要提交"
          else
            sgmodule_count=$(find Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
            ruleset_count=$(find Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0")
            
            # 构建提交信息
            COMMIT_MSG="自动构建更新 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') [模块${sgmodule_count}个] [规则${ruleset_count}个]"
            
            # 添加优化信息
            if [[ "${{ steps.optimize-ip.outputs.ip_optimized }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [IP优化: -${{ steps.optimize-ip.outputs.ip_reduced }}]"
            fi
            
            if [[ "${{ steps.optimize-domains.outputs.domains_optimized }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [域名优化: -${{ steps.optimize-domains.outputs.domains_reduced }}]"
            fi
            
            if [[ "${{ steps.optimize-reject.outputs.reject_processed }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [Reject优化: 处理${{ steps.optimize-reject.outputs.reject_processed }}条]"
            fi
            
            COMMIT_MSG="$COMMIT_MSG [触发${{ github.event_name }}]"
            
            git commit -m "$COMMIT_MSG"
            
            max_retries=3
            retry_count=0
            while [ $retry_count -lt $max_retries ]; do
              if git push; then
                echo "推送成功"
                break
              else
                echo "推送失败，尝试同步远程更改... (尝试 $((retry_count + 1))/$max_retries)"
                git pull --rebase || {
                  echo "Rebase 失败，使用 merge 策略"
                  git pull --no-rebase
                }
                retry_count=$((retry_count + 1))
                if [ $retry_count -eq $max_retries ]; then
                  echo "达到最大重试次数，推送失败"
                  exit 1
                fi
              fi
            done
          fi

      - name: 保存缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .cache
            .cache/*.db
            .cache/*.db-wal
            .cache/*.db-shm
          key: ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}

      - name: 生成构建报告
        if: always()
        run: |
          echo "## 🚀 Esdeath 规则集构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📋 基本信息" >> $GITHUB_STEP_SUMMARY
          echo "- 执行时间: ${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 缓存状态: ${{ steps.cache-restore.outputs.cache-hit == 'true' && '命中' || '未命中' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔄 构建流程执行情况" >> $GITHUB_STEP_SUMMARY
          echo "| 阶段 | 名称 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 第一阶段 | 外部规则和模块获取 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第二阶段 | 源文件组织和预处理 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第三阶段 | 规则验证 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第四阶段 | 增量构建检测 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第五阶段 | 构建规则集 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第六阶段 | 规则优化 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第七阶段 | 构建网站 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第八阶段 | 构建报告和统计 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第九阶段 | 部署准备 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "| 第十阶段 | Git提交和推送 | ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 📊 构建统计" >> $GITHUB_STEP_SUMMARY
          sgmodule_count=$(find Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
          ruleset_count=$(find Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0")
          domainset_count=$(find output/domainset -name "*.conf" 2>/dev/null | wc -l || echo "0")
          
          echo "- Surge 模块: $sgmodule_count 个" >> $GITHUB_STEP_SUMMARY
          echo "- 规则集文件: $ruleset_count 个" >> $GITHUB_STEP_SUMMARY
          echo "- 域名集文件: $domainset_count 个" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🔍 规则集分类" >> $GITHUB_STEP_SUMMARY
          echo "- 纯域名规则集: 使用 DomainsetOutput 处理（启用 tldts 规范化）" >> $GITHUB_STEP_SUMMARY
          echo "- 纯 IP 规则集: 使用 RulesetOutput 处理（进行 CIDR 合并）" >> $GITHUB_STEP_SUMMARY
          echo "- 混合规则集: 使用 RulesetOutput 处理（不进行域名规范化）" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### ⚡ 优化技术" >> $GITHUB_STEP_SUMMARY
          echo "- **tldts 规范化**: 提取有效域名，去除无效子域" >> $GITHUB_STEP_SUMMARY
          echo "- **Trie 深度优化**: 自动去除冗余子域名" >> $GITHUB_STEP_SUMMARY
          echo "- **CIDR 合并**: 使用 fast-cidr-tools 合并 IP 段" >> $GITHUB_STEP_SUMMARY
          echo "- **并行处理**: 多线程构建提升效率" >> $GITHUB_STEP_SUMMARY
          echo "- **流式处理**: 大文件使用流式读取减少内存占用" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### ✅ 验证结果" >> $GITHUB_STEP_SUMMARY
          echo "- 规则语法验证: 通过 ✅" >> $GITHUB_STEP_SUMMARY
          echo "- TLD 合法性检测: 通过 ✅" >> $GITHUB_STEP_SUMMARY
          echo "- 哈希碰撞检测: 已集成在构建流程中" >> $GITHUB_STEP_SUMMARY
          echo "- 域名活性检测: 需手动触发 check-domain.yml 工作流" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 🛠️ 技术栈" >> $GITHUB_STEP_SUMMARY
          echo "- TypeScript + Node.js 20" >> $GITHUB_STEP_SUMMARY
          echo "- fdir (高效文件遍历)" >> $GITHUB_STEP_SUMMARY
          echo "- @henrygd/queue (并发处理)" >> $GITHUB_STEP_SUMMARY
          echo "- cli-progress (进度显示)" >> $GITHUB_STEP_SUMMARY
          echo "- foxts (工具库优化)" >> $GITHUB_STEP_SUMMARY
          echo "- xxhash-wasm (哈希计算)" >> $GITHUB_STEP_SUMMARY
          echo "- fast-cidr-tools (CIDR 合并)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "📝 提示: 完整的构建日志请查看 Actions 运行记录" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: main_build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    name: 部署
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 下载网站文件
        uses: actions/download-artifact@v4
        with:
          name: website-files
          path: public

      - name: 准备部署
        id: prepare_deploy
        run: |
          echo "📦 准备部署网站..."
          
          # 验证文件
          if [ ! -f "public/index.html" ]; then
            echo "❌ 缺少 index.html 文件"
            exit 1
          fi
          
          # 输出统计
          echo "📊 部署统计："
          echo "  - 规则文件: $(find public/Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 模块文件: $(find public/Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 脚本文件: $(find public/Surge/Scripts -name "*.js" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 总大小: $(du -sh public | cut -f1)"
          
          echo "✅ 部署准备完成"

      - name: 构建后检查
        run: |
          echo "🔍 检查部署文件..."
          
          if [ ! -d "public" ]; then
            echo "❌ public 目录不存在"
            exit 1
          fi
          
          if [ ! -f "public/index.html" ]; then
            echo "❌ index.html 不存在"
            exit 1
          fi
          
          if [ -z "$(ls -A public)" ]; then
            echo "❌ public 目录为空"
            exit 1
          fi
          
          echo "✅ 文件检查通过"
          echo "📁 public 目录内容："
          ls -la public
          
          # 显示 index.html 的前几行确认是正确的网站
          echo ""
          echo "📄 index.html 预览："
          head -n 20 public/index.html || true

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传部署文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: 部署成功通知
        if: success()
        run: |
          echo "✅ 部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "🌐 访问地址: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "📅 部署时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "📦 Git Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
