name: Build & Deploy

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.github/dependabot.yml'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
  schedule:
    # 每天 05:00 和 17:00 UTC 执行完整构建 (2 次/天)
    - cron: '0 5,17 * * *'
    # 每 4 小时执行规则转换 (6 次/天，从 12 次优化)
    - cron: '0 */4 * * *'
    # 每天 3 次镜像同步 (从每小时 3 次优化为每天 3 次，减少 96%)
    - cron: '0 6,14,22 * * *'
    # 每天 2 次插件转换 (从每小时 2 次优化为每天 2 次，减少 96%)
    - cron: '30 7,19 * * *'
  workflow_dispatch:
    inputs:
      task:
        description: '执行任务 (all/build/convert-plugins/merge-modules/mirror-sync/deploy)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - build
          - convert-plugins
          - merge-modules
          - mirror-sync
          - deploy
      deploy_target:
        description: '部署目标 (all/github/cloudflare)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - github
          - cloudflare

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 准备阶段：确定需要执行的任务
  # ============================================
  prepare:
    name: Prepare Tasks
    runs-on: ubuntu-24.04-arm
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      should_convert_plugins: ${{ steps.decide.outputs.should_convert_plugins }}
      should_merge_modules: ${{ steps.decide.outputs.should_merge_modules }}
      should_mirror_sync: ${{ steps.decide.outputs.should_mirror_sync }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      deploy_target: ${{ steps.decide.outputs.deploy_target }}
    steps:
      - name: Decide tasks to run
        id: decide
        run: |
          # 🔧 修复: 正确处理空字符串的情况
          TASK="${{ github.event.inputs.task }}"
          if [ -z "$TASK" ]; then
            TASK="all"
          fi

          IS_SCHEDULE="${{ github.event_name == 'schedule' }}"
          IS_PUSH="${{ github.event_name == 'push' }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"
          IS_WORKFLOW_DISPATCH="${{ github.event_name == 'workflow_dispatch' }}"
          CRON="${{ github.event.schedule }}"

          # 默认值
          BUILD="false"
          CONVERT_PLUGINS="false"
          MERGE_MODULES="false"
          MIRROR_SYNC="false"
          DEPLOY="false"

          DEPLOY_TARGET="${{ github.event.inputs.deploy_target }}"
          if [ -z "$DEPLOY_TARGET" ]; then
            DEPLOY_TARGET="all"
          fi

          # 手动触发 - 根据 task 参数决定
          if [ "$IS_WORKFLOW_DISPATCH" = "true" ]; then
            if [ "$TASK" = "all" ] || [ "$TASK" = "build" ]; then BUILD="true"; fi
            if [ "$TASK" = "all" ] || [ "$TASK" = "convert-plugins" ]; then CONVERT_PLUGINS="true"; fi
            if [ "$TASK" = "all" ] || [ "$TASK" = "merge-modules" ]; then MERGE_MODULES="true"; fi
            if [ "$TASK" = "all" ] || [ "$TASK" = "mirror-sync" ]; then MIRROR_SYNC="true"; fi
            if [ "$TASK" = "all" ] || [ "$TASK" = "deploy" ]; then DEPLOY="true"; fi
          fi

          # 定时任务
          if [ "$IS_SCHEDULE" = "true" ]; then
            case "$CRON" in
              "0 5,17 * * *")
                # 完整构建 - 执行所有任务 (每天 2 次)
                CONVERT_PLUGINS="true"
                MERGE_MODULES="true"
                MIRROR_SYNC="true"
                BUILD="true"
                DEPLOY="true"
                ;;
              "0 */4 * * *")
                # 规则更新 - 仅执行 Build (每 4 小时，6 次/天)
                BUILD="true"
                DEPLOY="true"
                ;;
              "0 6,14,22 * * *")
                # 镜像同步 (每天 3 次: 06:00, 14:00, 22:00 UTC)
                MIRROR_SYNC="true"
                ;;
              "30 7,19 * * *")
                # 插件转换 (每天 2 次: 07:30, 19:30 UTC)
                CONVERT_PLUGINS="true"
                ;;
            esac
          fi

          # Push 触发 - 执行完整流程
          if [ "$IS_PUSH" = "true" ] && [ "$IS_SCHEDULE" != "true" ]; then
            CONVERT_PLUGINS="true"
            MERGE_MODULES="true"
            MIRROR_SYNC="true"
            BUILD="true"
            DEPLOY="true"
          fi

          # PR 触发
          if [ "$IS_PR" = "true" ]; then
            BUILD="true"
            DEPLOY="false"
          fi

          echo "should_build=$BUILD" >> $GITHUB_OUTPUT
          echo "should_convert_plugins=$CONVERT_PLUGINS" >> $GITHUB_OUTPUT
          echo "should_merge_modules=$MERGE_MODULES" >> $GITHUB_OUTPUT
          echo "should_mirror_sync=$MIRROR_SYNC" >> $GITHUB_OUTPUT
          echo "should_deploy=$DEPLOY" >> $GITHUB_OUTPUT
          echo "deploy_target=$DEPLOY_TARGET" >> $GITHUB_OUTPUT

          echo "📋 Trigger Information:"
          echo "  Event: ${{ github.event_name }}"
          echo "  Task: $TASK"
          echo "  Is Schedule: $IS_SCHEDULE"
          echo "  Is Push: $IS_PUSH"
          echo "  Is PR: $IS_PR"
          echo "  Is Workflow Dispatch: $IS_WORKFLOW_DISPATCH"
          echo "  Cron: $CRON"
          echo ""
          echo "📋 Tasks to run:"
          echo "  Build: $BUILD"
          echo "  Convert Plugins: $CONVERT_PLUGINS"
          echo "  Merge Modules: $MERGE_MODULES"
          echo "  Mirror Sync: $MIRROR_SYNC"
          echo "  Deploy: $DEPLOY (target: $DEPLOY_TARGET)"

  # ============================================
  # 核心构建任务 - 包含规则转换和合并
  # ============================================
  build:
    name: Build
    needs: prepare
    if: needs.prepare.outputs.should_build == 'true'
    runs-on: ubuntu-24.04-arm
    steps:
      # 🚀 网络性能优化
      - uses: smorimoto/tune-github-hosted-runner-network@v1

      - uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 1

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v5
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Setup build directory
        id: build-dir
        run: |
          echo "dir=public" >> $GITHUB_OUTPUT
          mkdir -p public

      # 🚀 增量构建优化：下载上次构建结果作为基础
      - name: Download Previous Build (for incremental build)
        continue-on-error: true
        uses: actions/checkout@v5
        with:
          repository: lucking7/NRRule
          persist-credentials: false
          filter: "tree:0"
          fetch-tags: false
          path: previous-build

      - name: Setup incremental build baseline
        continue-on-error: true
        run: |
          if [ -d "previous-build" ] && [ "$(ls -A previous-build 2>/dev/null)" ]; then
            echo "📦 Loading previous build as baseline..."
            cp -r previous-build/* public/ 2>/dev/null || true
            rm -rf previous-build
            echo "✅ Previous build loaded successfully"
          else
            echo "ℹ️ No previous build found, starting fresh build"
          fi
      
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
          echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
      
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}
          restore-keys: |
            ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-
            ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-
            ${{ runner.os }}-build-v3-
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm run build
        env:
          PUBLIC_DIR: ${{ steps.build-dir.outputs.dir }}
      
      - name: Verify build output
        run: |
          if [ ! -d "${{ steps.build-dir.outputs.dir }}" ]; then
            echo "❌ Build directory not found"
            exit 1
          fi
          if [ ! "$(ls -A ${{ steps.build-dir.outputs.dir }})" ]; then
            echo "❌ Build directory is empty"
            exit 1
          fi
          echo "✅ Build output verified"
      
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: ${{ steps.build-dir.outputs.dir }}
          retention-days: 1
          compression-level: 4
      
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}

  # ============================================
  # 插件转换任务
  # ============================================
  convert-plugins:
    name: Convert Plugins
    needs: prepare
    if: needs.prepare.outputs.should_convert_plugins == 'true'
    runs-on: ubuntu-latest  # 🔧 改用 x86_64 架构（Script-Hub 可能不支持 ARM）
    continue-on-error: true  # Script-Hub 服务可能不稳定，允许失败
    permissions:
      contents: write
    services:
      script-hub:
        image: xream/script-hub:latest
        ports:
          - 9100:9100
          - 9101:9101
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - name: Diagnose Script-Hub service
        run: |
          echo "127.0.0.1 script.hub" | sudo tee -a /etc/hosts

          echo "📊 系统信息:"
          echo "  架构: $(uname -m)"
          echo "  内核: $(uname -r)"
          echo "  发行版: $(cat /etc/os-release | grep PRETTY_NAME)"

          echo ""
          echo "🐳 Docker 容器信息:"
          docker ps -a

          echo ""
          echo "⏳ 等待 Script-Hub 服务启动..."

          # 使用 netcat 检查端口（更快更可靠）
          for i in {1..20}; do
            if nc -z localhost 9101; then
              echo "✓ Script-Hub 端口 9101 已开放 (尝试 $i/20)"
              sleep 5
              break
            fi
            echo "  尝试 $i/20 失败，等待 5 秒后重试..."
            sleep 5
          done

          if ! nc -z localhost 9101; then
            echo "::error ::Script-Hub 服务启动超时"
            exit 1
          fi

          echo ""
          echo "🔍 Script-Hub 服务诊断:"

          # 1. 测试 HTTP 服务
          echo "1. 测试 HTTP 根路径..."
          if curl -f -s -m 10 http://localhost:9101/ > /dev/null; then
            echo "   ✅ HTTP 服务正常"
          else
            echo "   ❌ HTTP 服务异常"
          fi

          # 2. 测试能否访问外部网络（从容器内部）
          echo "2. 测试容器网络连接..."
          CONTAINER_ID=$(docker ps -q -f ancestor=xream/script-hub:latest)
          if [ -n "$CONTAINER_ID" ]; then
            echo "   容器 ID: $CONTAINER_ID"

            # 测试 DNS 解析
            if docker exec "$CONTAINER_ID" nslookup kelee.one 2>/dev/null; then
              echo "   ✅ DNS 解析正常"
            else
              echo "   ⚠️  DNS 解析失败（容器内可能没有 nslookup）"
            fi

            # 测试网络连接
            if docker exec "$CONTAINER_ID" wget -q --spider --timeout=10 https://kelee.one 2>/dev/null; then
              echo "   ✅ 可以访问 kelee.one"
            else
              echo "   ❌ 无法访问 kelee.one"
            fi
          else
            echo "   ⚠️  未找到 Script-Hub 容器"
          fi

          # 3. 从宿主机测试访问 kelee.one
          echo "3. 测试宿主机网络连接..."
          if curl -I -s -m 10 https://kelee.one/Tool/Loon/Lpx/Block_HTTPDNS.lpx | head -1; then
            echo "   ✅ 宿主机可以访问 kelee.one"
          else
            echo "   ❌ 宿主机无法访问 kelee.one"
          fi

          # 4. 测试 Script-Hub 转换功能
          echo "4. 测试 Script-Hub 转换功能..."
          TEST_URL="http://localhost:9101/file/_start_/https://kelee.one/Tool/Loon/Lpx/Block_HTTPDNS.lpx/_end_/test.sgmodule?type=loon-plugin&target=surge-module"

          HTTP_CODE=$(curl -s -o /tmp/test-response.txt -w "%{http_code}" -m 30 \
            -A "Surge Mac/2985" \
            "$TEST_URL")

          echo "   HTTP 状态码: $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "   ✅ 转换功能正常"
            echo "   响应大小: $(wc -c < /tmp/test-response.txt) 字节"
          else
            echo "   ❌ 转换功能异常"
            echo "   响应内容:"
            cat /tmp/test-response.txt | head -20
          fi

          echo ""
          echo "📋 诊断完成"

      - name: Convert plugins with retry
        run: |
          # 增加超时时间到 600 秒
          # 允许部分插件转换失败（Script-Hub 服务可能不稳定）
          pnpm run convert-plugins --wait-service --timeout 600 || {
            echo "⚠️ 首次转换失败，等待 10 秒后重试..."
            sleep 10
            pnpm run convert-plugins --wait-service --timeout 600 || {
              echo "⚠️ 两次转换都失败，可能是 Script-Hub 服务问题"
              echo "📊 检查是否有成功转换的插件..."

              # 检查是否有成功转换的文件
              if [ -d "public/Plugins" ] && [ "$(ls -A public/Plugins 2>/dev/null | wc -l)" -gt 0 ]; then
                echo "✅ 发现 $(ls -A public/Plugins | wc -l) 个成功转换的插件"
                echo "⚠️ 继续执行，但部分插件可能未转换"
                exit 0
              else
                echo "❌ 没有成功转换的插件，任务失败"
                exit 1
              fi
            }
          }
        env:
          CI: true
      
      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Plugins/
            git commit -m "🔄 转换插件 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # 模块合并任务
  # ============================================
  merge-modules:
    name: Merge Modules
    needs: prepare
    if: needs.prepare.outputs.should_merge_modules == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Prepare directories
        run: |
          mkdir -p public/Modules/{Original,Merged}

      - run: pnpm run merge-modules
        env:
          CI: true

      - name: Commit changes
        run: |
          git add -N -f public/Modules/Merged/
          if ! git diff --quiet --exit-code public/Modules/Merged/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Modules/Merged/
            git commit -m "🎯 合并模块 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # 镜像同步任务
  # ============================================
  mirror-sync:
    name: Mirror Sync
    needs: prepare
    if: needs.prepare.outputs.should_mirror_sync == 'true'
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run node ./Build/sync-mirrors.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Mirror/
            git commit -m "🪞 同步镜像 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # PR 差异对比 - 预览构建变更
  # ============================================
  diff-deployment-on-pr:
    name: Diff Build Output
    needs: [prepare, build]
    if: |
      github.event_name == 'pull_request' &&
      needs.build.result == 'success'
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public

      - name: Compare with production
        run: |
          echo "📥 Downloading production build..."
          git clone --filter=tree:0 --no-tags \
            https://github.com/lucking7/NRRule.git ./deploy-git

          cd ./deploy-git
          echo "📊 Comparing changes..."
          rm -rf ./*
          cp -rf ../public/* ./

          echo ""
          echo "📈 File statistics:"
          git --no-pager diff --stat

          echo ""
          echo "📝 Detailed changes (first 500 lines):"
          git --no-pager diff --minimal | head -500

          echo ""
          echo "✅ Diff complete"

  # ============================================
  # 部署到 Cloudflare Pages
  # ============================================
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: [prepare, build]
    if: |
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.prepare.outputs.deploy_target == 'all' || needs.prepare.outputs.deploy_target == 'cloudflare') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=nrrule --commit-dirty=true --branch=main
          wranglerVersion: '3.114.12'

  # ============================================
  # 部署到 GitHub Repository
  # ============================================
  deploy-github:
    name: Deploy to GitHub Repository
    needs: [prepare, build]
    if: |
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.prepare.outputs.deploy_target == 'all' || needs.prepare.outputs.deploy_target == 'github') &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success'
    runs-on: ubuntu-24.04
    steps:
      # 🔧 下载 build artifact 而不是 checkout 源代码
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}-${{ github.run_number }}
          path: public

      # 验证 public 目录内容
      - name: Verify public directory
        run: |
          echo "📁 Public 目录内容："
          ls -la public/ || echo "⚠️ public 目录不存在"
          echo ""
          echo "📊 文件统计："
          echo "  Modules: $(find public/Modules -type f 2>/dev/null | wc -l) 个文件"
          echo "  Scripts: $(find public/Scripts -type f 2>/dev/null | wc -l) 个文件"
          echo "  List: $(find public/List -type f 2>/dev/null | wc -l) 个文件"
          echo "  Mirror: $(find public/Mirror -type f 2>/dev/null | wc -l) 个文件"
          echo "  Plugins: $(find public/Plugins -type f 2>/dev/null | wc -l) 个文件"
          echo "  GeoIP: $(find public/GeoIP -type f 2>/dev/null | wc -l) 个文件"

      - name: Deploy to NRRule Repository
        continue-on-error: true
        run: |
          gh repo unarchive lucking7/NRRule --yes || true

          git clone --filter=tree:0 --no-tags \
            https://${GH_USER}:${GH_TOKEN}@github.com/lucking7/NRRule.git \
            ./deploy-git

          cd ./deploy-git
          git config user.email "${GH_EMAIL}"
          git config user.name "${GH_USER}"

          rm -rf ./*
          cp -rf ../public/* ./

          git add --all .
          git commit -m "deploy: ${{ github.repository }}@${{ github.sha }}"
          git push --quiet --force origin HEAD:main

          cd ..
          rm -rf ./deploy-git

          gh repo archive lucking7/NRRule --yes || true
        env:
          GH_EMAIL: ${{ secrets.GIT_EMAIL }}
          GH_USER: ${{ secrets.GIT_USER }}
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}

