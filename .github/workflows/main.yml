name: Build & Deploy

on:
  push:
    branches:
      - main
      - master
  pull_request:
  schedule:
    # 每天 05:00 和 17:00 UTC 执行完整构建
    - cron: '0 5,17 * * *'
    # 每 2 小时执行规则转换
    - cron: '0 */2 * * *'
    # 每小时的 5, 30, 55 分执行镜像同步
    - cron: '5,30,55 * * * *'
    # 每小时的 10, 35 分执行插件转换
    - cron: '10,35 * * * *'
  workflow_dispatch:
    inputs:
      task:
        description: '执行任务 (all/build/convert-plugins/merge-modules/mirror-sync/rule-conversion/rule-merge/deploy)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - build
          - convert-plugins
          - merge-modules
          - mirror-sync
          - rule-conversion
          - rule-merge
          - deploy
      deploy_target:
        description: '部署目标 (all/github/cloudflare)'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - github
          - cloudflare

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # 准备阶段：确定需要执行的任务
  # ============================================
  prepare:
    name: Prepare Tasks
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
      should_convert_plugins: ${{ steps.decide.outputs.should_convert_plugins }}
      should_merge_modules: ${{ steps.decide.outputs.should_merge_modules }}
      should_mirror_sync: ${{ steps.decide.outputs.should_mirror_sync }}
      should_rule_conversion: ${{ steps.decide.outputs.should_rule_conversion }}
      should_rule_merge: ${{ steps.decide.outputs.should_rule_merge }}
      should_deploy: ${{ steps.decide.outputs.should_deploy }}
      deploy_target: ${{ steps.decide.outputs.deploy_target }}
    steps:
      - name: Decide tasks to run
        id: decide
        run: |
          TASK="${{ github.event.inputs.task || 'auto' }}"
          IS_SCHEDULE="${{ github.event_name == 'schedule' }}"
          IS_PUSH="${{ github.event_name == 'push' }}"
          IS_PR="${{ github.event_name == 'pull_request' }}"
          CRON="${{ github.event.schedule }}"
          
          # 默认值
          BUILD="false"
          CONVERT_PLUGINS="false"
          MERGE_MODULES="false"
          MIRROR_SYNC="false"
          RULE_CONVERSION="false"
          RULE_MERGE="false"
          DEPLOY="false"
          DEPLOY_TARGET="${{ github.event.inputs.deploy_target || 'all' }}"
          
          # 手动触发
          if [ "$TASK" = "all" ] || [ "$TASK" = "build" ]; then BUILD="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "convert-plugins" ]; then CONVERT_PLUGINS="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "merge-modules" ]; then MERGE_MODULES="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "mirror-sync" ]; then MIRROR_SYNC="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "rule-conversion" ]; then RULE_CONVERSION="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "rule-merge" ]; then RULE_MERGE="true"; fi
          if [ "$TASK" = "all" ] || [ "$TASK" = "deploy" ]; then DEPLOY="true"; fi
          
          # 定时任务
          if [ "$IS_SCHEDULE" = "true" ]; then
            case "$CRON" in
              "0 5,17 * * *")
                # 完整构建 - 执行所有任务
                CONVERT_PLUGINS="true"
                MERGE_MODULES="true"
                MIRROR_SYNC="true"
                RULE_CONVERSION="true"
                RULE_MERGE="true"
                BUILD="true"
                DEPLOY="true"
                ;;
              "0 */2 * * *")
                # 规则转换和合并
                RULE_CONVERSION="true"
                RULE_MERGE="true"
                ;;
              "5,30,55 * * * *")
                # 镜像同步
                MIRROR_SYNC="true"
                ;;
              "10,35 * * * *")
                # 插件转换
                CONVERT_PLUGINS="true"
                ;;
            esac
          fi
          
          # Push 触发 - 执行完整流程
          if [ "$IS_PUSH" = "true" ] && [ "$IS_SCHEDULE" != "true" ]; then
            CONVERT_PLUGINS="true"
            MERGE_MODULES="true"
            MIRROR_SYNC="true"
            RULE_CONVERSION="true"
            RULE_MERGE="true"
            BUILD="true"
            DEPLOY="true"
          fi
          
          # PR 触发
          if [ "$IS_PR" = "true" ]; then
            BUILD="true"
            DEPLOY="false"
          fi
          
          echo "should_build=$BUILD" >> $GITHUB_OUTPUT
          echo "should_convert_plugins=$CONVERT_PLUGINS" >> $GITHUB_OUTPUT
          echo "should_merge_modules=$MERGE_MODULES" >> $GITHUB_OUTPUT
          echo "should_mirror_sync=$MIRROR_SYNC" >> $GITHUB_OUTPUT
          echo "should_rule_conversion=$RULE_CONVERSION" >> $GITHUB_OUTPUT
          echo "should_rule_merge=$RULE_MERGE" >> $GITHUB_OUTPUT
          echo "should_deploy=$DEPLOY" >> $GITHUB_OUTPUT
          echo "deploy_target=$DEPLOY_TARGET" >> $GITHUB_OUTPUT
          
          echo "📋 Tasks to run:"
          echo "  Build: $BUILD"
          echo "  Convert Plugins: $CONVERT_PLUGINS"
          echo "  Merge Modules: $MERGE_MODULES"
          echo "  Mirror Sync: $MIRROR_SYNC"
          echo "  Rule Conversion: $RULE_CONVERSION"
          echo "  Rule Merge: $RULE_MERGE"
          echo "  Deploy: $DEPLOY (target: $DEPLOY_TARGET)"

  # ============================================
  # 核心构建任务 - 在所有转换/合并任务完成后执行
  # ============================================
  build:
    name: Build
    needs: [prepare, convert-plugins, merge-modules, mirror-sync, rule-conversion, rule-merge]
    # 🔧 使用 always() 允许在某些转换任务被跳过时仍然运行
    if: |
      always() &&
      needs.prepare.outputs.should_build == 'true' &&
      (needs.convert-plugins.result == 'success' || needs.convert-plugins.result == 'skipped') &&
      (needs.merge-modules.result == 'success' || needs.merge-modules.result == 'skipped') &&
      (needs.mirror-sync.result == 'success' || needs.mirror-sync.result == 'skipped') &&
      (needs.rule-conversion.result == 'success' || needs.rule-conversion.result == 'skipped') &&
      (needs.rule-merge.result == 'success' || needs.rule-merge.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 1
      
      - uses: pnpm/action-setup@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version-file: ".node-version"
          cache: "pnpm"
      
      - name: Setup build directory
        id: build-dir
        run: |
          echo "dir=public" >> $GITHUB_OUTPUT
          mkdir -p public
      
      - name: Get current date
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
          echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
      
      - name: Restore cache
        uses: actions/cache/restore@v4
        with:
          path: .cache
          key: ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}
          restore-keys: |
            ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-
            ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-
            ${{ runner.os }}-build-v3-
      
      - run: pnpm install --frozen-lockfile
      
      - run: pnpm run build
        env:
          PUBLIC_DIR: ${{ steps.build-dir.outputs.dir }}
      
      - name: Verify build output
        run: |
          if [ ! -d "${{ steps.build-dir.outputs.dir }}" ]; then
            echo "❌ Build directory not found"
            exit 1
          fi
          if [ ! "$(ls -A ${{ steps.build-dir.outputs.dir }})" ]; then
            echo "❌ Build directory is empty"
            exit 1
          fi
          echo "✅ Build output verified"
      
      - uses: actions/upload-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}
          path: ${{ steps.build-dir.outputs.dir }}
          retention-days: 1
          compression-level: 4
      
      - name: Save cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache
          key: ${{ runner.os }}-build-v3-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}

  # ============================================
  # 插件转换任务
  # ============================================
  convert-plugins:
    name: Convert Plugins
    needs: prepare
    if: needs.prepare.outputs.should_convert_plugins == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true  # Script-Hub 服务可能不稳定，允许失败
    permissions:
      contents: write
    services:
      script-hub:
        image: xream/script-hub:latest
        ports:
          - 9100:9100
          - 9101:9101
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'
      
      - run: pnpm install --frozen-lockfile
      
      - name: Configure Script-Hub
        run: |
          echo "127.0.0.1 script.hub" | sudo tee -a /etc/hosts
          echo "⏳ 等待 Script-Hub 服务启动..."
          for i in {1..30}; do
            if curl -f -s http://script.hub:9101/ > /dev/null 2>&1; then
              echo "✓ Script-Hub 服务就绪 (尝试 $i/30)"
              # 🔧 增加等待时间,确保服务完全稳定 (方案 3)
              sleep 10
              exit 0
            fi
            echo "  尝试 $i/30 失败，等待 5 秒后重试..."
            sleep 5
          done
          echo "❌ Script-Hub 服务启动超时"
          exit 1

      - name: Convert plugins with retry
        run: |
          # 增加超时时间到 600 秒
          pnpm run convert-plugins --wait-service --timeout 600 || {
            echo "⚠️ 首次转换失败，等待 10 秒后重试..."
            sleep 10
            pnpm run convert-plugins --wait-service --timeout 600 || {
              echo "❌ 两次转换都失败，可能是 Script-Hub 服务问题"
              exit 1
            }
          }
        env:
          CI: true
      
      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Plugins/
            git commit -m "🔄 转换插件 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # 模块合并任务
  # ============================================
  merge-modules:
    name: Merge Modules
    needs: prepare
    if: needs.prepare.outputs.should_merge_modules == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Prepare directories
        run: |
          mkdir -p public/Modules/{Original,Merged}

      - run: pnpm run merge-modules
        env:
          CI: true

      - name: Commit changes
        run: |
          git add -N -f public/Modules/Merged/
          if ! git diff --quiet --exit-code public/Modules/Merged/; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Modules/Merged/
            git commit -m "🎯 合并模块 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # 镜像同步任务
  # ============================================
  mirror-sync:
    name: Mirror Sync
    needs: prepare
    if: needs.prepare.outputs.should_mirror_sync == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm run node ./Build/sync-mirrors.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit changes
        run: |
          if ! git diff --quiet; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -f public/Mirror/
            git commit -m "🪞 同步镜像 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')"
            git pull --rebase origin main || true
            git push
          fi

  # ============================================
  # 规则转换任务 - 已集成在 Build 任务中,此任务仅用于独立触发
  # ============================================
  rule-conversion:
    name: Rule Conversion
    needs: prepare
    if: needs.prepare.outputs.should_rule_conversion == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip - Integrated in Build
        run: |
          echo "⏭️ 规则转换功能已集成在 Build 任务中"
          echo "此任务仅用于定时触发标记,实际转换在 Build 中完成"

  # ============================================
  # 规则合并任务 - 已集成在 Build 任务中,此任务仅用于独立触发
  # ============================================
  rule-merge:
    name: Rule Merge
    needs: [prepare, rule-conversion]
    if: |
      always() &&
      needs.prepare.outputs.should_rule_merge == 'true' &&
      (needs.rule-conversion.result == 'success' || needs.rule-conversion.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Skip - Integrated in Build
        run: |
          echo "⏭️ 规则合并功能已集成在 Build 任务中"
          echo "此任务仅用于定时触发标记,实际合并在 Build 中完成"

  # ============================================
  # 部署到 Cloudflare Pages
  # ============================================
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    needs: [prepare, build]
    if: |
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.prepare.outputs.deploy_target == 'all' || needs.prepare.outputs.deploy_target == 'cloudflare') &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}
          path: public

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=nrrule --commit-dirty=true --branch=main
          wranglerVersion: '3.114.12'

  # ============================================
  # 部署到 GitHub Repository
  # ============================================
  deploy-github:
    name: Deploy to GitHub Repository
    needs: [prepare, build, convert-plugins, merge-modules, mirror-sync, rule-conversion, rule-merge]
    # 🔧 使用 always() 条件,允许在依赖的 jobs 被跳过时仍然运行
    if: |
      always() &&
      needs.prepare.outputs.should_deploy == 'true' &&
      (needs.prepare.outputs.deploy_target == 'all' || needs.prepare.outputs.deploy_target == 'github') &&
      github.ref == 'refs/heads/main' &&
      needs.build.result == 'success' &&
      false
    runs-on: ubuntu-latest
    steps:
      # 🔧 下载 build artifact 而不是 checkout 源代码
      - uses: actions/download-artifact@v4
        with:
          name: build-artifact-${{ github.sha }}
          path: public

      # 验证 public 目录内容
      - name: Verify public directory
        run: |
          echo "📁 Public 目录内容："
          ls -la public/ || echo "⚠️ public 目录不存在"
          echo ""
          echo "📊 文件统计："
          echo "  Modules: $(find public/Modules -type f 2>/dev/null | wc -l) 个文件"
          echo "  Scripts: $(find public/Scripts -type f 2>/dev/null | wc -l) 个文件"
          echo "  List: $(find public/List -type f 2>/dev/null | wc -l) 个文件"
          echo "  Mirror: $(find public/Mirror -type f 2>/dev/null | wc -l) 个文件"
          echo "  Plugins: $(find public/Plugins -type f 2>/dev/null | wc -l) 个文件"
          echo "  GeoIP: $(find public/GeoIP -type f 2>/dev/null | wc -l) 个文件"

      - name: Deploy to NRRule Repository
        continue-on-error: true
        run: |
          gh repo unarchive lucking7/NRRule --yes || true

          git clone --filter=tree:0 --no-tags \
            https://${GH_USER}:${GH_TOKEN}@github.com/lucking7/NRRule.git \
            ./deploy-git

          cd ./deploy-git
          git config user.email "${GH_EMAIL}"
          git config user.name "${GH_USER}"

          rm -rf ./*
          cp -rf ../public/* ./

          git add --all .
          git commit -m "deploy: ${{ github.repository }}@${{ github.sha }}"
          git push --quiet --force origin HEAD:main

          cd ..
          rm -rf ./deploy-git

          gh repo archive lucking7/NRRule --yes || true
        env:
          GH_EMAIL: ${{ secrets.GIT_EMAIL }}
          GH_USER: ${{ secrets.GIT_USER }}
          GH_TOKEN: ${{ secrets.GIT_TOKEN }}

