name: Main Build Pipeline

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 */3 * * *'  # 每3小时执行一次
  workflow_dispatch:
    inputs:
      clearCache:
        description: '清理缓存'
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [trigger-main-build]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  main_build:
    name: 主构建流程
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    permissions:
      contents: write

    services:
      docker:
        image: xream/script-hub:latest
        ports:
          - 9100:9100
          - 9101:9101

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 获取当前日期
        id: date
        run: |
          echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT
          echo "year=$(date +'%Y')" >> $GITHUB_OUTPUT
          echo "month=$(date +'%m')" >> $GITHUB_OUTPUT
          echo "day=$(date +'%d')" >> $GITHUB_OUTPUT
          echo "hour=$(date +'%H')" >> $GITHUB_OUTPUT
          echo "minute=$(date +'%M')" >> $GITHUB_OUTPUT
          echo "second=$(date +'%S')" >> $GITHUB_OUTPUT

      - name: 恢复缓存
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: |
            .cache
            .cache/*.db
            .cache/*.db-wal
            .cache/*.db-shm
          key: ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}
          restore-keys: |
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }}
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-
            ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-
            ${{ runner.os }}-build-cache-v4-

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: |
          npm ci
          sudo apt-get update
          sudo apt-get install -y curl jq netcat-openbsd
          npm install -g tsx

      - name: 同步规则源
        if: github.event_name == 'schedule' || github.event_name == 'repository_dispatch'
        run: |
          echo "开始同步规则源..."
          npm run sync
        env:
          TZ: 'Asia/Shanghai'

      - name: 等待 Docker 服务就绪
        run: |
          echo "等待 Docker 服务就绪..."
          for i in {1..10}; do
            nc -z localhost 9101 && break
            sleep 10
          done

      - name: 转换 Loon 插件
        run: |
          echo "开始 Loon 到 Surge 规则转换..."
          mkdir -p Surge/Modules
          mkdir -p .cache
          
          # 确保转换服务就绪
          if ! nc -z localhost 9101; then
            echo "转换服务未就绪，跳过 Loon 转换"
            exit 0
          fi
          
          # 定义要转换的 Loon 插件
          cat > plugin_urls.txt << 'EOF'
          https://github.com/fmz200/wool_scripts/raw/main/Loon/plugin/blockAds.plugin|Remove_ads_by_fmz
          EOF
          
          # 设置并发数
          CONCURRENCY=${LOON_CONVERSION_CONCURRENCY:-5}
          echo "使用并发数: $CONCURRENCY"
          
          # 初始化缓存文件
          CACHE_FILE=".cache/loon_conversion_cache.txt"
          touch "$CACHE_FILE"
          
          # 清理过期缓存（7天）
          if [ "${{ github.event.inputs.clearCache }}" == "true" ]; then
            echo "清理所有缓存..."
            > "$CACHE_FILE"
          else
            # 清理7天前的缓存条目
            TEMP_CACHE=$(mktemp)
            while IFS='|' read -r cache_url cache_hash cache_time cache_name; do
              if [ -n "$cache_time" ] && [ "$cache_time" -gt $(($(date +%s) - 604800)) ]; then
                echo "${cache_url}|${cache_hash}|${cache_time}|${cache_name}" >> "$TEMP_CACHE"
              fi
            done < "$CACHE_FILE"
            mv "$TEMP_CACHE" "$CACHE_FILE"
          fi
          
          # 简单的转换函数
          convert_plugin() {
            local line="$1"
            local idx="$2"
            
            IFS='|' read -r plugin_url plugin_name <<< "$line"
            
            if [[ -z "$plugin_url" ]] || [[ -z "$plugin_name" ]]; then
              echo "[任务 $idx] ❌ 无效的插件配置: $line"
              return 1
            fi
            
            echo "[任务 $idx] 开始转换: $plugin_name"
            
            local output_file="Surge/Modules/${plugin_name}.sgmodule"
            
            # 检查缓存
            local cache_entry=$(grep "^${plugin_url}|" "$CACHE_FILE" | tail -1)
            local need_convert=true
            
            if [ -n "$cache_entry" ]; then
              IFS='|' read -r _ cached_hash cached_time _ <<< "$cache_entry"
              
              # 获取远程文件的 ETag 或最后修改时间
              local remote_headers=$(curl -sI "$plugin_url" | tr -d '\r')
              local remote_etag=$(echo "$remote_headers" | grep -i "^etag:" | cut -d' ' -f2- | tr -d '"')
              local remote_modified=$(echo "$remote_headers" | grep -i "^last-modified:" | cut -d' ' -f2-)
              local remote_hash="${remote_etag:-$remote_modified}"
              
              if [ -n "$remote_hash" ] && [ "$remote_hash" = "$cached_hash" ] && [ -f "$output_file" ]; then
                echo "[任务 $idx] ⚡ 使用缓存: $plugin_name (未更改)"
                need_convert=false
              else
                echo "[任务 $idx] 🔄 需要更新: $plugin_name"
              fi
            fi
            
            if [ "$need_convert" = true ]; then
              local encoded_url=$(echo "$plugin_url" | jq -sRr @uri)
              local download_url="http://localhost:9101/file/_start_/${plugin_url}/_end_/${plugin_name}.sgmodule?type=loon-plugin&target=surge-module&del=true"
              
              # 使用 Script Hub 进行基础转换
              if curl -A "script-hub/1.0.0" -L --connect-timeout 10 --max-time 30 -o "$output_file" "$download_url" 2>/dev/null; then
                echo "[任务 $idx] ✅ 转换成功: $plugin_name"
                
                # 更新缓存
                local remote_headers=$(curl -sI "$plugin_url" | tr -d '\r')
                local remote_etag=$(echo "$remote_headers" | grep -i "^etag:" | cut -d' ' -f2- | tr -d '"')
                local remote_modified=$(echo "$remote_headers" | grep -i "^last-modified:" | cut -d' ' -f2-)
                local remote_hash="${remote_etag:-$remote_modified}"
                local current_time=$(date +%s)
                
                # 从缓存中删除旧条目
                grep -v "^${plugin_url}|" "$CACHE_FILE" > "$CACHE_FILE.tmp" || true
                mv "$CACHE_FILE.tmp" "$CACHE_FILE"
                
                # 添加新缓存条目
                echo "${plugin_url}|${remote_hash}|${current_time}|${plugin_name}" >> "$CACHE_FILE"
                
                return 0
              else
                echo "[任务 $idx] ❌ 转换失败: $plugin_name"
                return 1
              fi
            fi
            
            return 0
          }
          
          # 并发转换
          job_count=0
          success_count=0
          cache_count=0
          fail_count=0
          
          while IFS= read -r line; do
            # 等待有空闲进程槽
            while [ $(jobs -r | wc -l) -ge $CONCURRENCY ]; do
              sleep 0.1
            done
            
            # 启动后台转换任务
            (
              if convert_plugin "$line" "$job_count"; then
                # 检查是否使用了缓存
                if grep -q "⚡ 使用缓存" <<< "$(convert_plugin "$line" "$job_count" 2>&1)"; then
                  echo "CACHE" > ".cache/job_${job_count}_result"
                else
                  echo "SUCCESS" > ".cache/job_${job_count}_result"
                fi
              else
                echo "FAIL" > ".cache/job_${job_count}_result"
              fi
            ) &
            
            job_count=$((job_count + 1))
            
            # 避免过快启动
            sleep 0.1
          done < plugin_urls.txt
          
          # 等待所有任务完成
          echo "等待所有转换任务完成..."
          wait
          
          # 统计结果
          for ((i=0; i<job_count; i++)); do
            if [ -f ".cache/job_${i}_result" ]; then
              result=$(cat ".cache/job_${i}_result")
              case "$result" in
                "SUCCESS") success_count=$((success_count + 1)) ;;
                "CACHE") cache_count=$((cache_count + 1)) ;;
                "FAIL") fail_count=$((fail_count + 1)) ;;
              esac
              rm -f ".cache/job_${i}_result"
            fi
          done
          
          echo ""
          echo "转换统计:"
          echo "  - 总任务数: $job_count"
          echo "  - 新转换: $success_count"
          echo "  - 使用缓存: $cache_count"
          echo "  - 失败: $fail_count"
          echo ""
          
          # 显示缓存信息
          cache_size=$(wc -l < "$CACHE_FILE" 2>/dev/null || echo "0")
          echo "缓存信息:"
          echo "  - 缓存条目: $cache_size"
          echo "  - 缓存文件: $CACHE_FILE"
          
          echo "Loon 插件转换完成"

      - name: 转换 QX 重写规则
        run: |
          echo "开始 QX 到 Surge 规则转换..."
          
          # 确保转换服务就绪
          if ! nc -z localhost 9101; then
            echo "转换服务未就绪，跳过 QX 转换"
            exit 0
          fi
          
          # 定义要转换的 QX 规则
          declare -A qx_rules=(
            ["Chongxie_by_fmz"]="https://github.com/fmz200/wool_scripts/raw/main/QuantumultX/rewrite/chongxie.txt"
          )
          
          # 转换 QX 规则
          for name in "${!qx_rules[@]}"; do
            url="${qx_rules[$name]}"
            output_file="Surge/Modules/${name}.sgmodule"
            
            echo "转换 QX 规则: $name"
            encoded_name=$(echo "$name" | jq -sRr @uri)
            
            # 使用 Script Hub 转换 QX 重写到 Surge 模块
            download_url="http://localhost:9101/file/_start_/${url}/_end_/${name}.sgmodule?type=qx-rewrite&target=surge-module&del=true"
            

            
            if curl -A "script-hub/1.0.0" -L --connect-timeout 10 --max-time 30 -o "$output_file" "$download_url" 2>/dev/null; then
              echo "✅ 转换成功: $name"
            else
              echo "❌ 转换失败: $name"
            fi
          done
          
          echo "QX 规则转换完成"

      - name: 处理和增强模块
        run: |
          echo "开始处理和增强 Surge 模块..."
          echo "包括：地址修复、参数注入、规则注入、验证等"
          NODE_OPTIONS="--experimental-specifier-resolution=node" tsx Chores/engineering/sync/module-processor.ts || {
            echo "模块处理失败，但继续构建流程"
          }

      - name: 合并 Surge 模块
        run: |
          echo "开始合并 Surge 模块..."
          mkdir -p Surge/Modules/Rules
          npm run merge

      - name: 优化 IP 段
        id: optimize-ip
        run: |
          cd ./Chores/engineering
          
          echo "🌐 开始优化 IP 段..."
          
          # 创建临时优化脚本
          cat > scripts/optimize-ip-cidrs.ts << 'EOF'
          import { fdir as Fdir } from 'fdir';
          import path from 'node:path';
          import fs from 'node:fs/promises';
          import { merge } from 'fast-cidr-tools';
          import picocolors from 'picocolors';
          
          interface IpOptimizationResult {
            file: string;
            originalCount: number;
            optimizedCount: number;
            reduction: number;
            optimized: boolean;
          }
          
          // 需要排除的文件列表
          const EXCLUDED_FILES = new Set([
            'domestic.list',
            'global.list',
            'reject.list',
            'telegram.list',
            'direct.list',
            'cdn.list',
            'stream.list',
            'microsoft.list',
            'lan.list',
            'apple.list'
          ]);
          
          async function optimizeIpCidrs() {
            const results: IpOptimizationResult[] = [];
            let totalOriginal = 0;
            let totalOptimized = 0;
            
            // 扫描规则文件
            const dirs = [
              path.join('../../Surge/Rulesets'),
              path.join('../../Clash/Rulesets')
            ];
            
            for (const dir of dirs) {
              try {
                const files = await new Fdir()
                  .withFullPaths()
                  .filter(p => p.endsWith('.list') || p.endsWith('.conf') || p.endsWith('.txt'))
                  .crawl(dir)
                  .withPromise();
                
                for (const file of files) {
                  const basename = path.basename(file);
                  
                  // 检查是否在排除列表中
                  if (EXCLUDED_FILES.has(basename)) {
                    console.log(\`⏭️  跳过排除文件: \${basename}\`);
                    continue;
                  }
                  
                  const content = await fs.readFile(file, 'utf-8');
                  const lines = content.split('\n');
                  const ipv4Cidrs: string[] = [];
                  const ipv6Cidrs: string[] = [];
                  const otherLines: string[] = [];
                  
                  // 分类规则
                  for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('//')) {
                      otherLines.push(line);
                      continue;
                    }
                    
                    if (trimmed.startsWith('IP-CIDR,')) {
                      const cidr = trimmed.substring(8).split(',')[0];
                      ipv4Cidrs.push(cidr);
                    } else if (trimmed.startsWith('IP-CIDR6,')) {
                      const cidr = trimmed.substring(9).split(',')[0];
                      ipv6Cidrs.push(cidr);
                    } else {
                      otherLines.push(line);
                    }
                  }
                  
                  // 如果没有 IP 规则，跳过
                  if (ipv4Cidrs.length === 0 && ipv6Cidrs.length === 0) {
                    continue;
                  }
                  
                  // 优化 IP 段
                  const optimizedIpv4 = ipv4Cidrs.length > 0 ? merge(ipv4Cidrs) : [];
                  const optimizedIpv6 = ipv6Cidrs.length > 0 ? merge(ipv6Cidrs) : [];
                  
                  const originalCount = ipv4Cidrs.length + ipv6Cidrs.length;
                  const optimizedCount = optimizedIpv4.length + optimizedIpv6.length;
                  
                  if (originalCount !== optimizedCount) {
                    // 重新生成文件
                    const newLines: string[] = [];
                    let ipInserted = false;
                    
                    for (const line of otherLines) {
                      const trimmed = line.trim();
                      
                      // 在第一个非注释行之前插入 IP 规则
                      if (!ipInserted && trimmed && !trimmed.startsWith('#') && !trimmed.startsWith('//')) {
                        // 插入优化后的 IPv4
                        for (const cidr of optimizedIpv4) {
                          newLines.push(\`IP-CIDR,\${cidr}\`);
                        }
                        // 插入优化后的 IPv6
                        for (const cidr of optimizedIpv6) {
                          newLines.push(\`IP-CIDR6,\${cidr}\`);
                        }
                        ipInserted = true;
                      }
                      
                      newLines.push(line);
                    }
                    
                    // 如果没有插入（文件只有注释），在末尾添加
                    if (!ipInserted) {
                      for (const cidr of optimizedIpv4) {
                        newLines.push(\`IP-CIDR,\${cidr}\`);
                      }
                      for (const cidr of optimizedIpv6) {
                        newLines.push(\`IP-CIDR6,\${cidr}\`);
                      }
                    }
                    
                    await fs.writeFile(file, newLines.join('\n'), 'utf-8');
                    
                    results.push({
                      file: path.relative(process.cwd(), file),
                      originalCount,
                      optimizedCount,
                      reduction: originalCount - optimizedCount,
                      optimized: true
                    });
                    
                    totalOriginal += originalCount;
                    totalOptimized += optimizedCount;
                  }
                }
              } catch (err) {
                console.warn(\`⚠️  跳过目录: \${dir}\`);
              }
            }
            
            // 输出报告
            console.log(\`\n📊 IP 段优化报告\`);
            console.log(\`✅ 优化文件数: \${results.filter(r => r.optimized).length}\`);
            console.log(\`📉 总压缩: \${totalOriginal} → \${totalOptimized} (减少 \${totalOriginal - totalOptimized})\`);
            
            if (results.length > 0) {
              console.log(\`\n\${picocolors.bold('优化详情:')}\`);
              for (const result of results) {
                if (result.optimized) {
                  console.log(\`  \${result.file}: \${result.originalCount} → \${result.optimizedCount} (-\${result.reduction})\`);
                }
              }
            }
            
            // 设置输出
            if (process.env.GITHUB_OUTPUT) {
              const fs = require('fs');
              fs.appendFileSync(process.env.GITHUB_OUTPUT, \`ip_optimized=\${results.filter(r => r.optimized).length}\n\`);
              fs.appendFileSync(process.env.GITHUB_OUTPUT, \`ip_reduced=\${totalOriginal - totalOptimized}\n\`);
            }
            
            return results.filter(r => r.optimized).length > 0;
          }
          
          optimizeIpCidrs().catch(err => {
            console.error('❌ IP 段优化失败:', err);
            process.exit(1);
          });
          EOF
          
          npx tsx scripts/optimize-ip-cidrs.ts || {
            echo "⚠️  IP 段优化失败，但继续构建流程"
            echo "ip_optimized=0" >> $GITHUB_OUTPUT
            echo "ip_reduced=0" >> $GITHUB_OUTPUT
          }
      
      - name: 优化域名规则
        id: optimize-domains
        run: |
          cd ./Chores/engineering
          
          echo "🌐 开始优化域名规则..."
          
          # 创建临时优化脚本
          cat > scripts/optimize-domains.ts << 'EOF'
          import { fdir as Fdir } from 'fdir';
          import path from 'node:path';
          import fs from 'node:fs/promises';
          import { HostnameSmolTrie } from '../lib/trie.js';
          import picocolors from 'picocolors';
          
          interface DomainOptimizationResult {
            file: string;
            originalCount: number;
            optimizedCount: number;
            reduction: number;
            optimized: boolean;
          }
          
          // 需要排除的文件列表
          const EXCLUDED_FILES = new Set([
            'domestic.list',
            'global.list', 
            'reject.list',
            'telegram.list',
            'direct.list',
            'cdn.list',
            'stream.list',
            'microsoft.list',
            'lan.list',
            'apple.list'
          ]);
          
          async function optimizeDomains() {
            const results: DomainOptimizationResult[] = [];
            let totalOriginal = 0;
            let totalOptimized = 0;
            
            // 扫描规则文件
            const dirs = [
              path.join('../../Surge/Rulesets'),
              path.join('../../Clash/Rulesets')
            ];
            
            for (const dir of dirs) {
              try {
                const files = await new Fdir()
                  .withFullPaths()
                  .filter(p => p.endsWith('.list') || p.endsWith('.conf') || p.endsWith('.txt'))
                  .crawl(dir)
                  .withPromise();
                
                for (const file of files) {
                  const basename = path.basename(file);
                  
                  // 检查是否在排除列表中
                  if (EXCLUDED_FILES.has(basename)) {
                    console.log(\`⏭️  跳过排除文件: \${basename}\`);
                    continue;
                  }
                  
                  // 跳过已经优化的文件
                  if (file.includes('-optimized')) continue;
                  
                  const content = await fs.readFile(file, 'utf-8');
                  const lines = content.split('\n');
                  const trie = new HostnameSmolTrie();
                  const otherRules: string[] = [];
                  let domainCount = 0;
                  
                  // 分类规则
                  for (const line of lines) {
                    const trimmed = line.trim();
                    if (!trimmed || trimmed.startsWith('#') || trimmed.startsWith('//')) {
                      otherRules.push(line);
                      continue;
                    }
                    
                    if (trimmed.startsWith('DOMAIN,')) {
                      const domain = trimmed.substring(7);
                      trie.add(domain, false);
                      domainCount++;
                    } else if (trimmed.startsWith('DOMAIN-SUFFIX,')) {
                      const domain = trimmed.substring(14);
                      trie.add(domain, true);
                      domainCount++;
                    } else {
                      otherRules.push(line);
                    }
                  }
                  
                  // 如果没有域名规则，跳过
                  if (domainCount === 0) continue;
                  
                  // 获取优化后的域名
                  const optimizedDomains: { domain: string; isSuffix: boolean }[] = [];
                  trie.dump((domain, isIncludeSubdomain) => {
                    optimizedDomains.push({ domain, isSuffix: isIncludeSubdomain });
                  });
                  
                  const optimizedCount = optimizedDomains.length;
                  
                  if (domainCount !== optimizedCount) {
                    // 重新生成文件
                    const newLines: string[] = [];
                    let domainInserted = false;
                    
                    for (const line of otherRules) {
                      const trimmed = line.trim();
                      
                      // 在第一个非注释行之前插入域名规则
                      if (!domainInserted && trimmed && !trimmed.startsWith('#') && !trimmed.startsWith('//')) {
                        // 插入优化后的域名
                        for (const { domain, isSuffix } of optimizedDomains) {
                          if (isSuffix) {
                            newLines.push(\`DOMAIN-SUFFIX,\${domain}\`);
                          } else {
                            newLines.push(\`DOMAIN,\${domain}\`);
                          }
                        }
                        domainInserted = true;
                      }
                      
                      newLines.push(line);
                    }
                    
                    // 如果没有插入，在末尾添加
                    if (!domainInserted) {
                      for (const { domain, isSuffix } of optimizedDomains) {
                        if (isSuffix) {
                          newLines.push(\`DOMAIN-SUFFIX,\${domain}\`);
                        } else {
                          newLines.push(\`DOMAIN,\${domain}\`);
                        }
                      }
                    }
                    
                    await fs.writeFile(file, newLines.join('\n'), 'utf-8');
                    
                    results.push({
                      file: path.relative(process.cwd(), file),
                      originalCount: domainCount,
                      optimizedCount,
                      reduction: domainCount - optimizedCount,
                      optimized: true
                    });
                    
                    totalOriginal += domainCount;
                    totalOptimized += optimizedCount;
                  }
                }
              } catch (err) {
                console.warn(\`⚠️  跳过目录: \${dir}\`);
              }
            }
            
            // 输出报告
            console.log(\`\n📊 域名优化报告\`);
            console.log(\`✅ 优化文件数: \${results.filter(r => r.optimized).length}\`);
            console.log(\`📉 总压缩: \${totalOriginal} → \${totalOptimized} (减少 \${totalOriginal - totalOptimized})\`);
            
            if (results.length > 0) {
              console.log(\`\n\${picocolors.bold('优化详情:')}\`);
              for (const result of results) {
                if (result.optimized) {
                  console.log(\`  \${result.file}: \${result.originalCount} → \${result.optimizedCount} (-\${result.reduction})\`);
                }
              }
            }
            
            // 设置输出
            if (process.env.GITHUB_OUTPUT) {
              const fs = require('fs');
              fs.appendFileSync(process.env.GITHUB_OUTPUT, \`domains_optimized=\${results.filter(r => r.optimized).length}\n\`);
              fs.appendFileSync(process.env.GITHUB_OUTPUT, \`domains_reduced=\${totalOriginal - totalOptimized}\n\`);
            }
            
            return results.filter(r => r.optimized).length > 0;
          }
          
          optimizeDomains().catch(err => {
            console.error('❌ 域名优化失败:', err);
            process.exit(1);
          });
          EOF
          
          npx tsx scripts/optimize-domains.ts || {
            echo "⚠️  域名优化失败，但继续构建流程"
            echo "domains_optimized=0" >> $GITHUB_OUTPUT
            echo "domains_reduced=0" >> $GITHUB_OUTPUT
          }

      - name: 优化 Reject 规则
        id: optimize-reject
        run: |
          cd ./Chores/engineering
          
          echo "🚫 开始优化 Reject 规则集..."
          
          # 运行 reject 优化器测试脚本
          npx tsx sync/test-reject-optimizer.ts || {
            echo "⚠️  Reject 规则优化失败，但继续构建流程"
            echo "reject_processed=0" >> $GITHUB_OUTPUT
            echo "reject_invalid=0" >> $GITHUB_OUTPUT
            echo "reject_merged=0" >> $GITHUB_OUTPUT
          }

      - name: 验证规则集
        id: validate
        run: |
          cd ./Chores/engineering
          
          echo "🔍 开始规则集验证..."
          
          # 1. 验证规则语法
          echo "📝 验证规则语法..."
          npx tsx build/scripts/validate-rules.ts
          
          # 2. 检测非法 TLD
          echo "🌐 检测非法 TLD..."
          npx tsx build/scripts/validate-illegal-tld.ts
          
          # 3. 检测 Reject 规则 TLD 合法性
          echo "🌐 检测 Reject 规则 TLD 合法性..."
          npx tsx scripts/check-reject-tld.ts || {
            echo "⚠️  发现非法 TLD，但继续构建流程"
            echo "💡 可以使用 npm run fix:reject-tld 修复"
          }
          
          echo "✅ 规则集验证完成！"

      - name: 提交更改
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          git add Surge/Modules/*.sgmodule 2>/dev/null || true
          git add Surge/Modules/Rules/*.list 2>/dev/null || true
          git add Surge/Scripts/*.js 2>/dev/null || true
          git add Surge/Rulesets/**/*.list 2>/dev/null || true
          git add Chores/ruleset/**/*.list 2>/dev/null || true
          
          if git diff --cached --quiet; then
            echo "没有文件需要提交"
          else
            sgmodule_count=$(find Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
            ruleset_count=$(find Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0")
            
            # 构建提交信息
            COMMIT_MSG="自动构建更新 - $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S') [模块${sgmodule_count}个] [规则${ruleset_count}个]"
            
            # 添加优化信息
            if [[ "${{ steps.optimize-ip.outputs.ip_optimized }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [IP优化: -${{ steps.optimize-ip.outputs.ip_reduced }}]"
            fi
            
            if [[ "${{ steps.optimize-domains.outputs.domains_optimized }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [域名优化: -${{ steps.optimize-domains.outputs.domains_reduced }}]"
            fi
            
            if [[ "${{ steps.optimize-reject.outputs.reject_processed }}" != "0" ]]; then
              COMMIT_MSG="$COMMIT_MSG [Reject优化: 处理${{ steps.optimize-reject.outputs.reject_processed }}条]"
            fi
            
            COMMIT_MSG="$COMMIT_MSG [触发${{ github.event_name }}]"
            
            git commit -m "$COMMIT_MSG"
            
            max_retries=3
            retry_count=0
            while [ $retry_count -lt $max_retries ]; do
              if git push; then
                echo "推送成功"
                break
              else
                echo "推送失败，尝试同步远程更改... (尝试 $((retry_count + 1))/$max_retries)"
                git pull --rebase || {
                  echo "Rebase 失败，使用 merge 策略"
                  git pull --no-rebase
                }
                retry_count=$((retry_count + 1))
                if [ $retry_count -eq $max_retries ]; then
                  echo "达到最大重试次数，推送失败"
                  exit 1
                fi
              fi
            done
          fi

      - name: 保存缓存
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .cache
            .cache/*.db
            .cache/*.db-wal
            .cache/*.db-shm
          key: ${{ runner.os }}-build-cache-v4-${{ steps.date.outputs.year }}-${{ steps.date.outputs.month }}-${{ steps.date.outputs.day }} ${{ steps.date.outputs.hour }}:${{ steps.date.outputs.minute }}:${{ steps.date.outputs.second }}

      - name: 生成构建报告
        if: always()
        run: |
          echo "## 主构建流程报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### 构建统计" >> $GITHUB_STEP_SUMMARY
          echo "- 执行时间: ${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY
          echo "- 触发方式: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- 缓存状态: ${{ steps.cache-restore.outputs.cache-hit == 'true' && '命中' || '未命中' }}" >> $GITHUB_STEP_SUMMARY
          
          sgmodule_count=$(find Surge/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0")
          ruleset_count=$(find Surge/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0")
          echo "- 转换模块: $sgmodule_count 个" >> $GITHUB_STEP_SUMMARY
          echo "- 规则文件: $ruleset_count 个" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 验证结果" >> $GITHUB_STEP_SUMMARY
          echo "- 状态: 验证通过" >> $GITHUB_STEP_SUMMARY
          echo "- 总错误数: 0 个" >> $GITHUB_STEP_SUMMARY
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 优化结果" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.optimize-ip.outputs.ip_optimized }}" != "0" ]]; then
            echo "- IP 段优化: 优化了 ${{ steps.optimize-ip.outputs.ip_optimized }} 个文件，减少 ${{ steps.optimize-ip.outputs.ip_reduced }} 条规则" >> $GITHUB_STEP_SUMMARY
          else
            echo "- IP 段优化: 无需优化" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.optimize-domains.outputs.domains_optimized }}" != "0" ]]; then
            echo "- 域名优化: 优化了 ${{ steps.optimize-domains.outputs.domains_optimized }} 个文件，减少 ${{ steps.optimize-domains.outputs.domains_reduced }} 条规则" >> $GITHUB_STEP_SUMMARY
          else
            echo "- 域名优化: 无需优化" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [[ "${{ steps.optimize-reject.outputs.reject_processed }}" != "0" ]]; then
            echo "- Reject 规则优化: 处理了 ${{ steps.optimize-reject.outputs.reject_processed }} 条规则" >> $GITHUB_STEP_SUMMARY
            echo "  - 无效 TLD: ${{ steps.optimize-reject.outputs.reject_invalid }} 条" >> $GITHUB_STEP_SUMMARY
            echo "  - 合并规则: ${{ steps.optimize-reject.outputs.reject_merged }} 条" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Reject 规则优化: 无需优化" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "提示: 域名活性检测需手动触发 check-domain.yml 工作流" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: main_build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    name: 部署
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 安装依赖
        run: npm ci

      - name: 创建 RAM 磁盘构建目录
        id: build_dir
        run: |
          # 创建RAM磁盘目录
          RAM_DIR="/dev/shm/esdeath_build"
          sudo mkdir -p $RAM_DIR
          sudo chmod 777 $RAM_DIR
          echo "临时构建目录: $RAM_DIR"
          echo "dir=$RAM_DIR" >> $GITHUB_OUTPUT

      - name: 构建网站
        run: |
          echo "开始构建网站..."
          
          # 设置环境变量指定 RAM 磁盘为输出目录
          export OUTPUT_DIR="${{ steps.build_dir.outputs.dir }}"
          export RAM_DIR="${{ steps.build_dir.outputs.dir }}"
          export CI=true
          
          # 执行构建命令
          npm run build
          
          # 验证构建结果
          if [ ! -d "$OUTPUT_DIR" ] || [ -z "$(ls -A $OUTPUT_DIR)" ]; then
            echo "❌ 构建失败：输出目录为空"
            exit 1
          fi
          
          # 如果构建输出到了 public 目录而不是 RAM 磁盘，则复制过去
          if [ -d "public" ] && [ "$OUTPUT_DIR" != "$(pwd)/public" ]; then
            echo "复制构建结果到 RAM 磁盘..."
            cp -r public/* "$OUTPUT_DIR/" || true
          fi
          
          # 确保有 index.html
          if [ ! -f "$OUTPUT_DIR/index.html" ]; then
            echo "❌ 构建失败：缺少 index.html"
            exit 1
          fi
          
          # 输出构建统计
          echo "✅ 网站构建成功！"
          echo "📊 构建统计："
          echo "  - 规则文件: $(find $OUTPUT_DIR/Rulesets -name "*.list" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 模块文件: $(find $OUTPUT_DIR/Modules -name "*.sgmodule" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 脚本文件: $(find $OUTPUT_DIR/Scripts -name "*.js" 2>/dev/null | wc -l || echo "0") 个"
          echo "  - 总大小: $(du -sh $OUTPUT_DIR | cut -f1)"
          
          # 生成部署信息
          echo "部署时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" > $OUTPUT_DIR/deploy-info.txt
          echo "Git Commit: ${{ github.sha }}" >> $OUTPUT_DIR/deploy-info.txt
          echo "构建目录: $OUTPUT_DIR" >> $OUTPUT_DIR/deploy-info.txt
        env:
          TZ: 'Asia/Shanghai'
          CI: 'true'

      - name: 构建后检查
        run: |
          OUTPUT_DIR="${{ steps.build_dir.outputs.dir }}"
          
          if [ ! -d "$OUTPUT_DIR" ]; then
            echo "❌ 构建目录不存在"
            exit 1
          fi
          
          if [ ! -f "$OUTPUT_DIR/index.html" ]; then
            echo "❌ index.html 不存在"
            exit 1
          fi
          
          if [ -z "$(ls -A $OUTPUT_DIR)" ]; then
            echo "❌ 构建目录为空"
            exit 1
          fi
          
          echo "✅ 构建检查通过"
          echo "📁 构建目录内容："
          ls -la $OUTPUT_DIR
          
          # 显示 index.html 的前几行确认是正确的网站
          echo ""
          echo "📄 index.html 预览："
          head -n 20 $OUTPUT_DIR/index.html || true

      - name: 设置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 上传部署文件
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.build_dir.outputs.dir }}

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        
      - name: 部署成功通知
        if: success()
        run: |
          echo "✅ 部署成功！" >> $GITHUB_STEP_SUMMARY
          echo "🌐 访问地址: ${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
          echo "📅 部署时间: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')" >> $GITHUB_STEP_SUMMARY
          echo "📦 Git Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
